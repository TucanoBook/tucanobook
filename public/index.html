window.calcMovTotal=function(){
  var wrap=document.getElementById('mov-items-wrap');if(!wrap)return;
  var type=(document.getElementById('ms-type')||{value:'saida'}).value;
  var total=0,lines=[];
  var n=wrap.children.length;
  for(var i=0;i<n;i++){
    var qty=parseFloat((document.getElementById('ms-qty-'+i)||{value:'0'}).value)||0;
    var price=parseCur((document.getElementById('ms-price-'+i)||{value:'0'}).value)||0;
    if(qty>0&&price>0){total+=qty*price;lines.push(qty+'x $'+price.toFixed(2));}
  }
  var bar=document.getElementById('ms-total-bar');
  if(bar){bar.style.display=total>0?'block':'none';bar.innerHTML='<strong>Total Produtos: '+BRL(total)+'</strong>'+(lines.length>1?' ('+lines.join(' + ')+')':'');}
  if(type==='entrada'){
    var totalBRFreight=parseCur((document.getElementById('ms-frete-br-total')||{value:'0'}).value)||0;
    var totalBoxWeight=parseFloat((document.getElementById('ms-box-weight')||{value:'0'}).value)||0;
    var result=document.getElementById('frete-calc-result');
    if(result&&(totalBRFreight>0||totalBoxWeight>0)){
      var rows=[];
      var totalWeightCalc=0;
      for(var j=0;j<n;j++){
        var q=parseFloat((document.getElementById('ms-qty-'+j)||{value:'0'}).value)||0;
        var w=parseFloat((document.getElementById('ms-weight-'+j)||{value:'0'}).value)||0;
        if(q>0&&w>0)totalWeightCalc+=q*w;
      }
      for(var k=0;k<n;k++){
        var bTxt=(document.getElementById('ms-book-'+k+'-txt')||{value:''}).value;
        var q2=parseFloat((document.getElementById('ms-qty-'+k)||{value:'0'}).value)||0;
        var w2=parseFloat((document.getElementById('ms-weight-'+k)||{value:'0'}).value)||0;
        if(q2>0&&w2>0&&totalWeightCalc>0){
          var unitFr=(w2/totalWeightCalc)*totalBRFreight;
          rows.push((bTxt||'Item '+(k+1))+': $'+unitFr.toFixed(2)+'/un ('+w2+'kg × '+q2+'un)');
        }
      }
      result.style.display='block';
      result.innerHTML='<strong>📦 Frete BR alocado:</strong><br>Peso total: '+(totalWeightCalc||totalBoxWeight).toFixed(2)+'kg<br>'+rows.join('<br>');
    } else if(result){result.style.display='none';}
  }
};
window.saveMov2=function(){
  var type=(document.getElementById('ms-type')||{value:'saida'}).value;
  var wrap=document.getElementById('mov-items-wrap');if(!wrap)return alert('Erro');
  var items=[],n=wrap.children.length;
  for(var i=0;i<n;i++){
    var bId=(document.getElementById('ms-book-'+i)||{value:''}).value;
    var bTxt=(document.getElementById('ms-book-'+i+'-txt')||{value:''}).value;
    var qty=parseInt((document.getElementById('ms-qty-'+i)||{value:'1'}).value)||1;
    var price=parseCur((document.getElementById('ms-price-'+i)||{value:'0'}).value)||0;
    var wt=parseFloat((document.getElementById('ms-weight-'+i)||{value:'0'}).value)||0;
    if(bId&&qty>0&&price>0)items.push({bookId:bId,bookTitle:bTxt,qty:qty,price:price,weight:wt});
  }
  if(!items.length)return alert('Adicione pelo menos um produto.');
  var date=(document.getElementById('ms-date')||{value:today()}).value;
  var notes=(document.getElementById('ms-notes')||{value:''}).value;
  var clientId=(document.getElementById('ms-client')||{value:''}).value||'';
  var supplierId=(document.getElementById('ms-supplier')||{value:''}).value||'';
  var client=clientId?window.state.clients.find(function(x){return x.id===clientId;}):null;
  var supplier=supplierId?window.state.suppliers.find(function(x){return x.id===supplierId;}):null;
  var ugc=((document.getElementById('ms-ugc')||{value:''}).value||'').trim();
  var ugcName=((document.getElementById('ms-ugc-name')||{value:''}).value||'').trim();
  var disc=parseFloat((document.getElementById('ms-disc')||{value:'0'}).value)||0;
  var fI=parseCur((document.getElementById('ms-frete-import')||{value:'0'}).value)||0;
  var fB=parseCur((document.getElementById('ms-frete-br')||{value:'0'}).value)||0;
  var totalBRFreight=parseCur((document.getElementById('ms-frete-br-total')||{value:'0'}).value)||0;
  var totalBoxWeight=parseFloat((document.getElementById('ms-box-weight')||{value:'0'}).value)||0;
  var freightUSAUnit=parseCur((document.getElementById('ms-frete-usa-unit')||{value:'5.50'}).value)||5.50;
  var motivo=(document.getElementById('ms-motivo')||{value:''}).value||'';
  var ok=true;
  items.forEach(function(item){
    var isKit=item.bookId.startsWith('kit-'),kid=isKit?item.bookId.replace('kit-',''):'';
    var kit=kid?window.state.kits.find(function(k){return k.id===kid;}):null;
    var book=!isKit?window.state.books.find(function(b){return b.id===item.bookId;}):null;
    var stock=isKit?(kit?kit.stock||0:0):(book?book.stock:0);
    if(type!=='entrada'&&stock<item.qty){alert('Estoque insuficiente: '+item.bookTitle);ok=false;}
  });
  if(!ok)return;
  items.forEach(function(item){
    var isKit=item.bookId.startsWith('kit-'),kid=isKit?item.bookId.replace('kit-',''):'';
    var kit=kid?window.state.kits.find(function(k){return k.id===kid;}):null;
    var book=!isKit?window.state.books.find(function(b){return b.id===item.bookId;}):null;
    var net=disc>0?item.price*(1-disc/100):item.price;
    var totalItemWeight=items.reduce(function(a,it){return a+it.weight*it.qty;},0)||1;
    var unitFreightBR=totalBRFreight>0&&item.weight>0?(item.weight/totalItemWeight)*totalBRFreight:0;
    var baseCost=isKit?(kit?((parseCur(kit.costPrice)||0)+(parseCur(kit.packagingCost)||0)):0):(book?(book.costPrice||0):0);
    var unitFreightUSA=isKit?0:(type==='entrada'?freightUSAUnit:(book?(book.freightUSA??5.50):5.50));
    var cogs=(baseCost+unitFreightUSA+unitFreightBR)*item.qty;
    window.state.movements.push({id:genId(),type:type,bookId:item.bookId,bookTitle:item.bookTitle,
      quantity:item.qty,unitPrice:type==='entrada'?item.price:net,grossUnitPrice:item.price,
      freightCost:fI+fB+totalBRFreight,freightImport:fI,freightBR:type==='entrada'?totalBRFreight:fB,supplierId:supplierId,
      supplierName:supplier?supplier.name:ugcName,clientId:clientId,clientName:client?client.name:'',
      ugcCode:ugc||ugcName,discountPct:disc,shopifyFee:0,cogs:cogs,date:date,
      notes:notes||(motivo?'Perda: '+motivo:''),source:'manual'});
    if(type==='entrada'){
      if(isKit)window.state.kits=window.state.kits.map(function(k){return k.id===kid?Object.assign({},k,{stock:(k.stock||0)+item.qty}):k;});
      else window.state.books=window.state.books.map(function(b){return b.id===item.bookId?Object.assign({},b,{stock:b.stock+item.qty}):b;});
    }else{
      if(isKit)window.state.kits=window.state.kits.map(function(k){return k.id===kid?Object.assign({},k,{stock:Math.max(0,(k.stock||0)-item.qty)}):k;});
      else window.state.books=window.state.books.map(function(b){return b.id===item.bookId?Object.assign({},b,{stock:Math.max(0,b.stock-item.qty)}):b;});
    }
  });
  saveState('movements');saveState('books');saveState('kits');
  closeModal();toast(items.length+' item(s) registrado(s)!');renderMovimentos();
};

// Shopify CSV Import
function csvRow(row){var cells=[],cur='',inQ=false;for(var i=0;i<row.length;i++){var ch=row[i];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cells.push(cur.trim());cur='';}else{cur+=ch;}}cells.push(cur.trim());return cells;}
var SMAP=[
  ['Raizes Brasileiras','k03'],['Mega Combo Heranca','k04'],['Super Combo Devocional Infantil','k06'],
  ['Super Combo Devocional Completo','k06'],['Divertidamente','k10'],['Divertida Mente','k10'],
  ['Meu Primeiro Altar','k14'],['Tesouro Biblico','k12'],['Exploradores da Natureza','k09'],
  ['Banho Explorador','k02'],['Banho Cristao','k01'],['Monica','k11'],['Pack','k08'],
  ['Duo','k13'],['Expedicao Safari','k07'],['Embalagem',null]
];
function findKitShopify(name){
  var n=name.toLowerCase();
  for(var i=0;i<SMAP.length;i++){if(n.indexOf(SMAP[i][0].toLowerCase())>=0)return SMAP[i][1];}
  return null;
}
window.importShopifyCSV=function(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var lines=e.target.result.split('\n').filter(function(l){return l.trim();});
      var headers=csvRow(lines[0]).map(function(h){return h.replace(/^"|"$/g,'');});
      var gi=function(h){return headers.findIndex(function(x){return x===h;});};
      var gc=function(cells,h){var i=gi(h);return i>=0?(cells[i]||'').replace(/^"|"$/g,'').trim():'';};
      var orders={};
      for(var i=1;i<lines.length;i++){
        var cells=csvRow(lines[i]);if(cells.length<5)continue;
        var oName=gc(cells,'Name');if(!oName)continue;
        if(!orders[oName]){
          var tot=parseFloat(gc(cells,'Total'))||0;
          orders[oName]={name:oName,date:(gc(cells,'Paid at')||gc(cells,'Created at')).slice(0,10),discCode:gc(cells,'Discount Code'),total:tot,shopifyFee:tot>0?+(tot*0.029+0.30).toFixed(2):0,items:[]};
        }
        var iN=gc(cells,'Lineitem name'),iQ=parseInt(gc(cells,'Lineitem quantity'))||1,iP=parseFloat(gc(cells,'Lineitem price'))||0,iD=parseFloat(gc(cells,'Lineitem discount'))||0;
        if(iN)orders[oName].items.push({iN:iN,iQ:iQ,iP:iP,iD:iD});
      }
      var rows=[];
      Object.values(orders).forEach(function(o){
        var feeApplied=false;
        o.items.forEach(function(item){
          var kid=findKitShopify(item.iN);
          var kit=kid?window.state.kits.find(function(k){return k.id===kid;}):null;
          var net=item.iP-(item.iD/item.iQ||0);
          rows.push({order:o.name,date:o.date,discCode:o.discCode,iN:item.iN,iQ:item.iQ,iP:item.iP,iD:item.iD,net:net,kid:kid,kitName:kit?kit.name:'Nao mapeado',fee:feeApplied?0:o.shopifyFee});
          feeApplied=true;
        });
      });
      var mapped=rows.filter(function(r){return r.kid;}),unmapped=rows.filter(function(r){return !r.kid&&r.iN.toLowerCase().indexOf('embalagem')<0;});
      var totalRev=rows.reduce(function(a,r){return a+r.net*r.iQ;},0);
      var rowsHtml='';
      rows.forEach(function(r){
        rowsHtml+='<tr style="border-bottom:1px solid #f1f5f9">'
          +'<td style="padding:5px 8px;font-weight:600">'+r.order+'</td>'
          +'<td style="padding:5px 8px">'+r.date+'</td>'
          +'<td style="padding:5px 8px"><span class="badge '+(r.kid?'badge-green':'badge-red')+'">'+r.kitName+'</span></td>'
          +'<td style="padding:5px 8px;text-align:center">'+r.iQ+'</td>'
          +'<td style="padding:5px 8px;text-align:right">$'+r.net.toFixed(2)+'</td></tr>';
      });
      var html='<div class="alert '+(unmapped.length?'alert-amber':'alert-green')+'" style="margin-bottom:12px">'
        +(mapped.length)+' mapeados | '+unmapped.length+' sem mapeamento | Total: <strong>$'+totalRev.toFixed(2)+'</strong></div>'
        +(unmapped.length?'<div class="alert alert-amber" style="font-size:11px;margin-bottom:12px">Nao mapeados: '+[...new Set(unmapped.map(function(r){return r.iN;}))].slice(0,3).join(', ')+'</div>':'')
        +'<div style="max-height:260px;overflow-y:auto;margin-bottom:14px"><table style="width:100%;border-collapse:collapse;font-size:12px">'
        +'<thead><tr style="background:#f8fafc"><th style="padding:6px 8px">Pedido</th><th>Data</th><th>Kit</th><th>Qtd</th><th>Preco</th></tr></thead>'
        +'<tbody>'+rowsHtml+'</tbody></table></div>'
        +'<div style="display:flex;gap:10px;justify-content:flex-end">'
        +'<button class="btn btn-gray" onclick="closeModal()">Cancelar</button>'
        +'<button class="btn btn-green" onclick="confirmShopifyImport()" '+(mapped.length?'':'disabled')+'>Importar '+mapped.length+' item(s)</button></div>';
      window._sRows=rows;
      openModal('Importacao Shopify - Preview',html,true);
    }catch(err){toast('Erro ao ler CSV: '+err.message,'error');console.error(err);}
  };
  reader.readAsText(file);input.value='';
};
window.confirmShopifyImport=function(){
  var rows=window._sRows||[],imported=0,skipped=0;
  var seenO={};
  rows.forEach(function(r){
    if(!r.kid){skipped++;return;}
    var kit=window.state.kits.find(function(k){return k.id===r.kid;});if(!kit){skipped++;return;}
    var dup=window.state.movements.some(function(m){return m.notes&&m.notes.indexOf(r.order)>=0&&m.bookId==='kit-'+r.kid;});
    if(dup){skipped++;return;}
    var fee=seenO[r.order]?0:r.fee;seenO[r.order]=true;
    window.state.movements.push({id:genId(),type:'saida',bookId:'kit-'+r.kid,bookTitle:'Kit: '+kit.name,
      quantity:r.iQ,unitPrice:r.net,grossUnitPrice:r.iP,freightCost:0,freightImport:0,freightBR:0,
      clientId:'',clientName:'',ugcCode:r.discCode||'',discountPct:r.iD>0?+(r.iD/r.iP/r.iQ*100).toFixed(1):0,
      shopifyFee:fee,cogs:(kit.costPrice||0)*r.iQ,date:r.date,notes:'Shopify '+r.order,source:'shopify'});
    window.state.kits=window.state.kits.map(function(k){return k.id===r.kid?Object.assign({},k,{stock:Math.max(0,(k.stock||0)-r.iQ)}):k;});
    imported++;
  });
  saveState('movements');saveState('kits');closeModal();
  toast(imported+' importado(s)'+(skipped?' | '+skipped+' ignorado(s)':'')+'!');renderMovimentos();
};

function renderCompras(){
  const S=window.state;
  if(!window._compraQtds)window._compraQtds={};
  const totals={};
  S.kits.forEach(kit=>{
    const qty=parseInt(window._compraQtds[kit.id])||0;
    if(qty>0){
      kit.items.forEach(item=>{
        totals[item.bookId]=(totals[item.bookId]||0)+item.quantity*qty;
      });
    }
  });
  const hasItems=Object.keys(totals).length>0;
  document.getElementById('content').innerHTML=
    '<div class="card" style="margin-bottom:14px">'
    +'<div style="font-size:13px;font-weight:600;margin-bottom:12px">📦 Quantidades de Kits a Comprar</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px">'
    +S.kits.map(kit=>
      '<div style="background:#f8fafc;border-radius:10px;padding:12px;border:1px solid var(--border)">'
      +'<div style="font-size:13px;font-weight:600;margin-bottom:8px">🎁 '+kit.name+'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<label style="font-size:12px;color:var(--sub)">Qtd:</label>'
      +'<input type="number" min="0" value="'+(window._compraQtds[kit.id]||0)+'" oninput="window._compraQtds[\''+kit.id+'\']=parseInt(this.value)||0;renderCompras()" style="width:70px;padding:6px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;text-align:center">'
      +'</div></div>'
    ).join('')
    +'</div>'
    +'<div style="display:flex;gap:10px;margin-top:14px">'
    +'<button class="btn" onclick="window._compraQtds={};renderCompras()">🗑️ Limpar</button>'
    +'</div></div>'
    +(hasItems
      ?'<div class="card">'
        +'<div style="font-size:13px;font-weight:600;margin-bottom:12px">📋 Lista de Compras — Livros Necessários</div>'
        +'<table style="width:100%;border-collapse:collapse;font-size:13px">'
        +'<thead><tr style="background:#f8fafc;border-bottom:2px solid var(--border)">'
        +'<th style="padding:10px 14px;text-align:left">Livro</th>'
        +'<th style="padding:10px 14px;text-align:center">Necessário</th>'
        +'<th style="padding:10px 14px;text-align:center">Em Estoque</th>'
        +'<th style="padding:10px 14px;text-align:center">A Comprar</th>'
        +'<th style="padding:10px 14px;text-align:right">Custo Est. ($)</th>'
        +'</tr></thead><tbody>'
        +Object.entries(totals).map(function(entry){
          var bookId=entry[0],needed=entry[1];
          var b=S.books.find(function(bk){return bk.id===bookId;});if(!b)return'';
          var toComprar=Math.max(0,needed-b.stock);
          var effCost=(b.costPrice||0)+(b.freightUSA!=null?b.freightUSA:5.50);
          return'<tr style="border-bottom:1px solid #f1f5f9">'
            +'<td style="padding:10px 14px;font-weight:500">'+b.title+'<div style="font-size:11px;color:var(--sub)">'+b.author+'</div></td>'
            +'<td style="padding:10px 14px;text-align:center"><span class="badge badge-indigo">'+needed+'</span></td>'
            +'<td style="padding:10px 14px;text-align:center"><span class="badge '+(b.stock>=needed?'badge-green':b.stock>0?'badge-amber':'badge-red')+'">'+b.stock+'</span></td>'
            +'<td style="padding:10px 14px;text-align:center"><span class="badge '+(toComprar>0?'badge-red':'badge-green')+'">'+toComprar+'</span></td>'
            +'<td style="padding:10px 14px;text-align:right">'+(toComprar>0?BRL(toComprar*effCost):'—')+'</td>'
            +'</tr>';
        }).join('')
        +'<tr style="background:#f8fafc;border-top:2px solid var(--border);font-weight:600">'
        +'<td colspan="4" style="padding:10px 14px">Total estimado a comprar</td>'
        +'<td style="padding:10px 14px;text-align:right">'+BRL(Object.entries(totals).reduce(function(acc,entry){
          var bookId=entry[0],needed=entry[1];
          var b=S.books.find(function(bk){return bk.id===bookId;});if(!b)return acc;
          var toComprar=Math.max(0,needed-b.stock);
          return acc+toComprar*((b.costPrice||0)+(b.freightUSA!=null?b.freightUSA:5.50));
        },0))+'</td>'
        +'</tr></tbody></table></div>'
      :'<div class="card" style="text-align:center;padding:52px;color:var(--muted)">Digite a quantidade de kits acima para calcular os livros necessários.</div>');
}

function renderPage(p){
  const map={dashboard:renderDashboard,livros:renderLivros,movimentos:window.renderMovimentos,kits:window.renderKits,clientes:renderClientes,fornecedores:renderFornecedores,despesas:renderDespesas,relatorios:renderRelatorios,ugc:renderUgc,config:renderConfig,compras:renderCompras};
  if(map[p])map[p]();
}

// ── BOOT ─────────────────────────────────────────────────────────────────
document.getElementById('top-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
initFirebase().then(()=>{
  onAuthStateChanged(auth,async user=>{
    if(user){
      currentUser=user;
      document.getElementById('auth-screen').style.display='none';
      const uname=user.displayName||user.email;
      document.getElementById('sb-avatar').textContent=uname[0].toUpperCase();
      document.getElementById('sb-uname').textContent=uname;
      document.getElementById('sb-uemail').textContent=user.email;
      if(!window._dataLoaded){await loadState();window._dataLoaded=true;setupRealtime();}
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      buildNav();renderPage('dashboard');
      if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
      // Keep-alive: ping server every 4min to prevent container sleeping
      setInterval(()=>fetch('/health').catch(()=>{}), 4*60*1000);
    }else{
      currentUser=null;window._dataLoaded=false;stopListeners();
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('app').style.display='none';
      document.getElementById('auth-screen').style.display='flex';
      const lb=document.getElementById('login-btn');if(lb){lb.disabled=false;lb.textContent='Entrar';}
    }
  });
}).catch(err=>{setLoadMsg('❌ '+err.message);document.querySelector('.spinner').style.display='none';});

// ── MOBILE SIDEBAR ──────────────────────────────────────
window.toggleSidebar=function(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('mob-overlay');
  const isOpen=sb.classList.contains('open');
  if(isOpen){sb.classList.remove('open');ov.classList.remove('show');}
  else{sb.classList.add('open');ov.classList.add('show');}
};
window.closeSidebar=function(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('show');
};
// Auto-close sidebar on nav click (mobile)
const _origGoto=window.goto;
window.goto=function(page){
  closeSidebar();
  _origGoto(page);
};
</script>
