<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0f172a"><title>TucanoBook — Gestão</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:#f0f4f8;color:#1a2332;height:100vh;overflow:hidden}
:root{--navy:#0f172a;--indigo:#6366f1;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--bg:#f0f4f8;--card:#fff;--border:#e2e8f0;--text:#0f172a;--sub:#64748b;--muted:#94a3b8}
#loading-screen{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
#loading-screen h2{color:#fff;font-size:22px;font-weight:700}#loading-screen p{color:#64748b;font-size:13px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#312e81 100%);display:none;align-items:center;justify-content:center;z-index:500;padding:16px}
.auth-card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.auth-logo{text-align:center;margin-bottom:28px}.auth-logo span{font-size:44px}
.auth-logo h1{font-size:22px;font-weight:700;color:var(--text);margin-top:8px}.auth-logo p{font-size:13px;color:var(--sub);margin-top:4px}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:24px}
.auth-tab{padding:9px 0;text-align:center;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);border:none;background:transparent;font-family:'Sora',sans-serif;transition:all .15s}
.auth-tab.active{background:#fff;color:var(--indigo);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.auth-form{display:none}.auth-form.active{display:block}
.auth-fg{margin-bottom:14px}.auth-fg label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px}
.auth-fg input,.auth-fg select{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid var(--border);font-size:14px;color:var(--text);font-family:'Sora',sans-serif;outline:none;transition:border-color .15s}
.auth-fg input:focus,.auth-fg select:focus{border-color:var(--indigo)}
.auth-btn{width:100%;padding:12px;background:var(--indigo);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;margin-top:4px;transition:opacity .15s}
.auth-btn:hover{opacity:.88}.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-link{text-align:center;font-size:12px;color:var(--sub);margin-top:14px}.auth-link a{color:var(--indigo);cursor:pointer;font-weight:600}
.auth-err{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;border-radius:8px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:none}
.auth-ok{background:#f0fdf4;border:1px solid #86efac;color:#166534;border-radius:8px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:none}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:224px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo h1{color:#fff;font-size:15px;font-weight:700}.sb-logo small{color:#475569;font-size:11px;margin-top:2px;display:block}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-section{padding:14px 16px 3px;color:#475569;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:#94a3b8;font-size:13px;border-left:3px solid transparent;transition:all .12s}
.nav-item:hover{color:#cbd5e1;background:rgba(255,255,255,.04)}
.nav-item.active{color:#fff;font-weight:600;background:rgba(99,102,241,.18);border-left-color:#6366f1}
.sb-user{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{font-size:12px;color:#cbd5e1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-uemail{font-size:10px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{width:100%;padding:7px;background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.2);border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;padding:12px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.topbar h2{font-size:17px;font-weight:700}.topbar p{font-size:12px;color:var(--sub);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:18px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid var(--border)}
.stat-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid var(--border)}
.stat-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:24px;font-weight:700;color:var(--text);margin-top:5px}.stat-sub{font-size:12px;color:var(--sub);margin-top:3px}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;background:#f8fafc;border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;color:#374151;border-bottom:1px solid #f1f5f9}
tr:hover td{background:#fafbff}.empty-row td{text-align:center;color:var(--muted);padding:32px 14px}
.btn{background:var(--indigo);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:'Sora',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.88}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}.btn-gray{background:#e2e8f0;color:#475569}.btn-blue{background:var(--blue)}.btn-amber{background:var(--amber)}.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.fg{margin-bottom:13px}.fg label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;color:var(--text);font-family:'Sora',sans-serif;background:#fff;transition:border-color .15s;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--indigo)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}.badge-red{background:#fee2e2;color:#dc2626}.badge-indigo{background:#eef2ff;color:#4338ca}.badge-amber{background:#fef3c7;color:#92400e}.badge-blue{background:#dbeafe;color:#1d4ed8}.badge-gray{background:#f1f5f9;color:#475569}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:680px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-head h3{font-size:17px;font-weight:700;color:var(--text)}.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--sub)}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-btn{padding:10px 0;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;font-family:'Sora',sans-serif;transition:all .15s}
.filter-tabs{display:flex;gap:6px}
.filter-tab{background:#e2e8f0;color:#475569;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif}
.filter-tab.active{background:var(--indigo);color:#fff}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.alert-green{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.alert-red{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}
.alert-amber{background:#fffbeb;border:1px solid #fcd34d;color:#92400e}
.alert-blue{background:#eff6ff;border:1px solid #93c5fd;color:#1d4ed8}
.search-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search-input{flex:1;min-width:220px;max-width:320px;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Sora',sans-serif;outline:none}
.search-input:focus{border-color:var(--indigo)}
.chart-wrap{position:relative;height:200px}
.kit-card{background:#fff;border-radius:12px;padding:18px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.07)}
.kit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}.toast.success{background:#065f46;border-left:4px solid #10b981}.toast.error{background:#7f1d1d;border-left:4px solid #ef4444}
/* Sub-tabs */
.sub-tabs{display:flex;gap:0;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content}
.sub-tab{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);border:none;background:transparent;font-family:'Sora',sans-serif;transition:all .15s}
.sub-tab.active{background:#fff;color:var(--indigo);box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* Calc box */
.calc-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:9px 13px;font-size:12px;color:#166534;margin-top:-6px;margin-bottom:13px}
.calc-box.warn{background:#fffbeb;border-color:#fcd34d;color:#92400e}
/* Currency input */
.currency-wrap{position:relative}
.currency-wrap::before{content:'R$';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--sub);pointer-events:none}
.currency-wrap input{padding-left:30px !important}
/* User hero */
.user-hero{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;padding:20px;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.user-hero-av{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0}
/* Tag pill */
.tag{display:inline-flex;align-items:center;gap:5px;background:#f1f5f9;border-radius:20px;padding:4px 12px;font-size:12px;color:#374151;font-weight:500;margin:3px}
.tag button{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:14px;line-height:1;padding:0}
/* Kit stock bar */
.stock-bar{height:4px;background:#e2e8f0;border-radius:2px;margin-top:8px}
.stock-bar-fill{height:100%;border-radius:2px;background:#10b981;transition:width .3s}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

/* ── MOBILE RESPONSIVE ───────────────────────────────── */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none;z-index:201}
.hamburger span{display:block;width:22px;height:2px;background:#374151;border-radius:2px;transition:all .3s}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:198}
.mob-overlay.show{display:block}
@media(max-width:768px){
  .hamburger{display:flex}
  .app{flex-direction:column}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;z-index:199;-webkit-transform:translateX(-240px);transform:translateX(-240px);-webkit-transition:-webkit-transform .28s cubic-bezier(.4,0,.2,1);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(0,0,0,.3)}
  .sidebar.open{-webkit-transform:translateX(0);transform:translateX(0)}
  .main{width:100%;min-width:0}
  .topbar{padding:10px 14px}
  .topbar h2{font-size:15px}.topbar p{font-size:11px}
  .content{padding:12px 10px}
  .grid4{grid-template-columns:1fr 1fr !important}
  .grid3{grid-template-columns:1fr 1fr !important}
  .grid2{grid-template-columns:1fr !important}
  .stat-value{font-size:18px !important}
  .stat-card,.card{padding:14px 12px}
  /* Dashboard 2-col → 1-col */
  div[style*="grid-template-columns:2fr 1fr"]{display:block !important}
  div[style*="grid-template-columns:2fr 1fr"] > *{margin-bottom:12px}
  div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;display:grid !important}
  div[style*="grid-template-columns:330px"]{display:block !important}
  div[style*="grid-template-columns:330px"] > *{margin-bottom:12px}
  div[style*="grid-template-columns:340px"]{display:block !important}
  div[style*="grid-template-columns:340px"] > *{margin-bottom:12px}
  div[style*="grid-template-columns:300px"]{display:block !important}
  div[style*="grid-template-columns:300px"] > *{margin-bottom:12px}
  div[style*="grid-template-columns:repeat(auto-fill"]{grid-template-columns:1fr !important}
  /* Tables scroll */
  div[style*="overflow-x:auto"]{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:540px}
  /* Topbar */
  .topbar{gap:8px}
  #top-date{display:none}
  /* Kit grid */
  .kit-grid{grid-template-columns:1fr !important}
  /* Filter tabs wrap */
  .filter-tabs{flex-wrap:wrap}
  /* Auth card */
  .auth-card{padding:24px 18px}
  /* Modal */
  .modal,.modal-lg{max-width:100% !important;margin:0;border-radius:12px}
  .overlay{align-items:flex-end;padding:0}
  .modal,.modal-lg{border-radius:16px 16px 0 0;max-height:85vh}
  /* User hero */
  .user-hero{flex-direction:column;text-align:center;gap:10px}
  /* Sub tabs */
  .sub-tabs{width:100% !important;display:grid;grid-template-columns:1fr 1fr 1fr}
  .sub-tab{padding:8px 4px;font-size:12px}
}
@media(max-width:400px){
  .grid4{grid-template-columns:1fr !important}
  .stat-value{font-size:16px !important}
}
</style>
</head>
<body>
<div id="loading-screen"><div style="font-size:44px">📖</div><h2>TucanoBook</h2><div class="spinner"></div><p id="loading-msg">Conectando...</p></div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><span>📖</span><h1>TucanoBook</h1><p>Sistema de gestão de livraria</p></div>
    <div class="auth-tabs" id="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Cadastrar</button>
    </div>
    <div class="auth-form active" id="form-login">
      <div class="auth-err" id="login-err"></div>
      <div class="auth-fg"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="auth-fg"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="auth-btn" id="login-btn" onclick="doLogin()">Entrar</button>
      <div class="auth-link"><a onclick="switchAuthTab('reset')">Esqueci minha senha</a></div>
    </div>
    <div class="auth-form" id="form-register">
      <div class="auth-err" id="reg-err"></div>
      <div class="auth-fg"><label>Nome completo</label><input type="text" id="reg-name" placeholder="Seu nome" autocomplete="name"></div>
      <div class="auth-fg"><label>E-mail</label><input type="email" id="reg-email" placeholder="seu@email.com"></div>
      <div class="auth-fg"><label>Senha</label><input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres"></div>
      <div class="auth-fg"><label>Confirmar senha</label><input type="password" id="reg-pass2" placeholder="Repita a senha"></div>
      <div class="auth-fg"><label>Perfil</label><select id="reg-role"><option value="usuario">Usuário</option><option value="gerente">Gerente</option><option value="admin">Administrador</option></select></div>
      <button class="auth-btn" id="reg-btn" onclick="doRegister()">Criar conta</button>
    </div>
    <div class="auth-form" id="form-reset">
      <div class="auth-err" id="reset-err"></div><div class="auth-ok" id="reset-ok"></div>
      <p style="font-size:13px;color:var(--sub);margin-bottom:16px">Informe seu e-mail para receber o link de redefinição.</p>
      <div class="auth-fg"><label>E-mail</label><input type="email" id="reset-email" placeholder="seu@email.com"></div>
      <button class="auth-btn" id="reset-btn" onclick="doReset()">Enviar link de recuperação</button>
      <div class="auth-link"><a onclick="switchAuthTab('login')">← Voltar para o login</a></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="mob-overlay" id="mob-overlay" onclick="closeSidebar()"></div>
<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sb-logo"><h1>🦜 TucanoBook</h1><small>Gestão TucanoBook</small></div>
    <nav class="sb-nav" id="nav"></nav>
    <div class="sb-user">
      <div class="sb-user-row">
        <div class="sb-avatar" id="sb-avatar">?</div>
        <div style="overflow:hidden;flex:1"><div class="sb-uname" id="sb-uname">-</div><div class="sb-uemail" id="sb-uemail">-</div></div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Sair da conta</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()" id="hamburger-btn"><span></span><span></span><span></span></button>
      <div><h2 id="page-title">Dashboard</h2><p id="page-sub">Visão geral do negócio</p></div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:12px;color:var(--sub)" id="top-date"></div>
        <div id="save-indicator" style="font-size:11px;color:#10b981;display:none">✓ Salvo</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal-box">
    <div class="modal-head"><h3 id="modal-title"></h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,doc,getDoc,setDoc,getDocs,collection,updateDoc,onSnapshot}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged,sendPasswordResetEmail,updateProfile}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

let db,auth,currentUser=null;

async function initFirebase(){
  setLoadMsg('Carregando configuração...');
  const res=await fetch('/api/config');
  if(!res.ok)throw new Error(await res.text());
  const config=await res.json();
  if(config.error)throw new Error(config.error);
  const app=initializeApp(config);
  db=getFirestore(app);auth=getAuth(app);
  try{await enableIndexedDbPersistence(db);}catch(_){}
}

// ── AUTH UI ──────────────────────────────────────────────────────────────
window.switchAuthTab=function(tab){
  ['login','register','reset'].forEach(t=>document.getElementById('form-'+t).classList.toggle('active',t===tab));
  const tabs=document.querySelectorAll('.auth-tab');
  tabs[0].classList.toggle('active',tab==='login');tabs[1].classList.toggle('active',tab==='register');
  document.getElementById('auth-tabs').style.display=tab==='reset'?'none':'grid';
};
function authErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display=msg?'block':'none';}

async function loadState(){
  setLoadMsg('Carregando dados...');
  const defs={books:BOOKS0,clients:[],suppliers:[],movements:[],kits:[],expenses:[],expenseCategories:['Custos Fixos','Compra de Estoque','Frete de Compra','Marketing / UGC','Shopify / Taxas','Embalagem','Outros'],ugcCreators:[],partners:[{id:'p1',name:'Sócio 1',email:'',share:50},{id:'p2',name:'Sócio 2',email:'',share:50}]};
  // First load: get current data
  await Promise.all(Object.keys(defs).map(async key=>{
    try{const s=await getDoc(doc(db,COLL,key));window.state[key]=s.exists()?s.data().items:defs[key];}
    catch{window.state[key]=defs[key];}
  }));
}

function setupRealtime(){
  stopListeners();
  const defs={books:BOOKS0,clients:[],suppliers:[],movements:[],kits:[],expenses:[],expenseCategories:['Custos Fixos','Compra de Estoque','Frete de Compra','Marketing / UGC','Shopify / Taxas','Embalagem','Outros'],ugcCreators:[],partners:[{id:'p1',name:'Sócio 1',email:'',share:50},{id:'p2',name:'Sócio 2',email:'',share:50}]};
  let _firstLoad={};
  Object.keys(defs).forEach(key=>{
    _firstLoad[key]=true;
    const unsub=onSnapshot(doc(db,COLL,key),snap=>{
      const newData=snap.exists()?snap.data().items:defs[key];
      if(_firstLoad[key]){_firstLoad[key]=false;return;} // skip first trigger (already loaded)
      const changed=JSON.stringify(newData)!==JSON.stringify(window.state[key]);
      if(changed){
        window.state[key]=newData;
        // Show sync indicator
        const si=document.getElementById('save-indicator');
        if(si){si.textContent='🔄 Sincronizado';si.style.color='#3b82f6';si.style.display='block';clearTimeout(si._t);si._t=setTimeout(()=>{si.style.display='none';si.style.color='#10b981';},2500);}
        // Destroy existing charts before re-rendering
        Object.values(charts).forEach(c=>{try{c.destroy()}catch{}});charts={};
        try{renderPage(curPage);}catch(e){}
      }
    },err=>{
      if(err.code==='permission-denied')console.warn('Realtime: permissão negada para',key);
    });
    _rtListeners.push(unsub);
  });
  console.log('✅ Sincronização em tempo real ativa');
}

// Currency format helpers
function parseCur(v){return parseFloat(String(v).replace(',','.'))||0;}
function initCurrency(selector=''){
  setTimeout(()=>{
    document.querySelectorAll(selector||'.cur').forEach(el=>{
      if(!el.dataset.curInit){
        el.dataset.curInit='1';
        el.addEventListener('focus',e=>{if(e.target.value==='0.00'||e.target.value==='')e.target.select();});
        el.addEventListener('blur',e=>{const v=parseCur(e.target.value);e.target.value=v.toFixed(2);updateCalc();});
        el.addEventListener('input',()=>updateCalc());
      }
    });
  },50);
}
function updateCalc(){
  // book form
  const cost=parseCur(document.getElementById('f-cost')?.value),sale=parseCur(document.getElementById('f-sale')?.value);
  const bc=document.getElementById('book-calc');
  if(bc&&(cost>0||sale>0)){const margin=sale>0?((sale-cost)/sale*100):0,markup=cost>0?((sale-cost)/cost*100):0;bc.textContent=`Margem: ${margin.toFixed(1)}%  |  Markup: ${markup.toFixed(1)}%  |  Lucro unit.: ${BRL(sale-cost)}`;bc.className=markup>0?'calc-box':'calc-box warn';}
  // kit form
  updateKitCalc();
}
function updateKitCalc(){
  const el=document.getElementById('kit-calc');if(!el)return;
  const cost=window._kitItems?window._kitItems.reduce((a,item)=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return a+(b?b.costPrice*item.quantity:0);},0):0;
  const sale=parseCur(document.getElementById('kf-price')?.value);
  const markup=cost>0&&sale>0?((sale-cost)/cost*100):0;
  el.textContent=`Custo dos livros: ${BRL(cost)}${sale>0?`  |  Markup: ${markup.toFixed(1)}%  |  Lucro: ${BRL(sale-cost)}`:''}`;
  el.className=markup>0?'calc-box':'calc-box warn';
}

window.delMov=function(id){
  if(!confirm('Excluir movimentação? O estoque será revertido.'))return;
  const m=window.state.movements.find(x=>x.id===id);
  if(m){
    const isKit=m.bookId?.startsWith('kit-'),kid=isKit?m.bookId.replace('kit-',''):'';
    if(m.type==='entrada'){
      if(isKit)window.state.kits=window.state.kits.map(k=>k.id===kid?{...k,stock:Math.max(0,(k.stock||0)-m.quantity)}:k);
      else window.state.books=window.state.books.map(b=>b.id===m.bookId?{...b,stock:Math.max(0,b.stock-m.quantity)}:b);
    } else {
      if(isKit)window.state.kits=window.state.kits.map(k=>k.id===kid?{...k,stock:(k.stock||0)+m.quantity}:k);
      else window.state.books=window.state.books.map(b=>b.id===m.bookId?{...b,stock:b.stock+m.quantity}:b);
    }
  }
  window.state.movements=window.state.movements.filter(x=>x.id!==id);
  saveState('movements');saveState('books');saveState('kits');renderMovimentos();toast('Removido.');
};

window.saveMov2=function(){
  const type=document.getElementById('ms-type')?.value;
  const items=collectMovItems();
  if(!items.length)return alert('Adicione pelo menos um produto.');
  const date=document.getElementById('ms-date')?.value||today();
  const notes=document.getElementById('ms-notes')?.value||'';
  const clientId=document.getElementById('ms-client')?.value||'';
  const client=clientId?window.state.clients.find(c=>c.id===clientId):null;
  const supplierId=document.getElementById('ms-supplier')?.value||'';
  const supplier=supplierId?window.state.suppliers.find(s=>s.id===supplierId):null;
  const ugcCode=(document.getElementById('ms-ugc')?.value||document.getElementById('ms-ugc-name')?.value||'').trim();
  const discPct=parseFloat(document.getElementById('ms-disc')?.value)||0;
  const freteImport=parseCur(document.getElementById('ms-frete-import')?.value)||0;
  const freteBR=parseCur(document.getElementById('ms-frete-br')?.value)||0;
  const motivo=document.getElementById('ms-motivo')?.value||'';
  for(const item of items){
    const isKit=item.bookId?.startsWith('kit-');
    const kid=isKit?item.bookId.replace('kit-',''):'';
    const kit=kid?window.state.kits.find(k=>k.id===kid):null;
    const book=!isKit?window.state.books.find(b=>b.id===item.bookId):null;
    const stock=isKit?(kit?.stock||0):(book?.stock||0);
    if((type==='saida'||type==='brinde'||type==='perda')&&stock<item.qty)
      return alert(`Estoque insuficiente para "${item.bookTitle}"!\nDisponível: ${stock}`);
    const net=discPct>0?item.price*(1-discPct/100):item.price;
    const cogs=isKit?(kit?.costPrice||0)*item.qty:(book?.costPrice||0)*item.qty;
    window.state.movements.push({
      id:genId(),type,bookId:item.bookId,bookTitle:item.bookTitle,
      quantity:item.qty,unitPrice:type==='entrada'?item.price:net,grossUnitPrice:item.price,
      freightCost:freteBR+freteImport,freightImport:freteImport,freightBR:freteBR,
      supplierId,supplierName:supplier?.name||'',clientId,clientName:client?.name||'',
      ugcCode,discountPct:discPct,shopifyFee:0,cogs,date,
      notes:notes||(motivo?`Perda: ${motivo}`:''),source:'manual',
    });
    if(type==='entrada'){
      if(isKit)window.state.kits=window.state.kits.map(k=>k.id===kid?{...k,stock:(k.stock||0)+item.qty}:k);
      else window.state.books=window.state.books.map(b=>b.id===item.bookId?{...b,stock:b.stock+item.qty}:b);
    } else {
      if(isKit)window.state.kits=window.state.kits.map(k=>k.id===kid?{...k,stock:Math.max(0,(k.stock||0)-item.qty)}:k);
      else window.state.books=window.state.books.map(b=>b.id===item.bookId?{...b,stock:Math.max(0,b.stock-item.qty)}:b);
    }
  }
  saveState('movements');saveState('books');saveState('kits');
  closeModal();toast(`${items.length} item(s) registrado(s)!`);renderMovimentos();
};

window.applyStockAdjust=function(){
  let changed=0;
  document.querySelectorAll('.adj-input').forEach(inp=>{
    const id=inp.dataset.id,cur=parseInt(inp.dataset.cur)||0,novo=parseInt(inp.value)||0,diff=novo-cur;
    if(diff===0)return;
    const isKit=id.startsWith('kit-'),kid=isKit?id.replace('kit-',''):'';
    const type=diff>0?'entrada':'perda';
    const title=isKit?(window.state.kits.find(k=>k.id===kid)?.name||id):(window.state.books.find(b=>b.id===id)?.title||id);
    window.state.movements.push({id:genId(),type,bookId:isKit?`kit-${kid}`:id,bookTitle:title,quantity:Math.abs(diff),unitPrice:0,date:today(),notes:`Ajuste físico: ${cur}→${novo}`,source:'adjust'});
    if(isKit)window.state.kits=window.state.kits.map(k=>k.id===kid?{...k,stock:novo}:k);
    else window.state.books=window.state.books.map(b=>b.id===id?{...b,stock:novo}:b);
    changed++;
  });
  if(!changed)return alert('Nenhuma diferença encontrada.');
  saveState('movements');saveState('books');saveState('kits');closeModal();toast(`${changed} ajuste(s) aplicado(s)!`);
};

window.calcShoppingList=function(){
  const kits=window.state.kits;const books=window.state.books;
  const needed={};
  document.querySelectorAll('.sl-qty').forEach(inp=>{
    const qty=parseInt(inp.value)||0;if(!qty)return;
    const kit=kits.find(k=>k.id===inp.dataset.kid);if(!kit)return;
    for(const item of (kit.items||[])){
      needed[item.bookId]=(needed[item.bookId]||0)+item.quantity*qty;
    }
  });
  const el=document.getElementById('sl-result');if(!el)return;
  if(!Object.keys(needed).length){el.innerHTML='';return;}
  const rows=Object.entries(needed).map(([bid,need])=>{
    const b=books.find(x=>x.id===bid);if(!b)return'';
    const have=b.stock||0,buy=Math.max(0,need-have);
    return`<tr><td style="padding:6px 10px;font-size:12px">${b.title}</td><td style="padding:6px 10px;text-align:center;font-size:12px">${have}</td><td style="padding:6px 10px;text-align:center;font-size:12px">${need}</td><td style="padding:6px 10px;text-align:center;font-size:12px;font-weight:600;color:${buy>0?'#ef4444':'#10b981'}">${buy>0?buy:'✅'}</td></tr>`;
  }).join('');
  el.innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:8px">Componentes necessários:</div>
  <table style="width:100%;border-collapse:collapse"><thead><tr style="background:#f8fafc"><th style="padding:6px 10px;text-align:left;font-size:11px;color:var(--sub)">Componente</th><th style="padding:6px 10px;text-align:center;font-size:11px;color:var(--sub)">Em estoque</th><th style="padding:6px 10px;text-align:center;font-size:11px;color:var(--sub)">Necessário</th><th style="padding:6px 10px;text-align:center;font-size:11px;color:var(--sub)">Comprar</th></tr></thead><tbody>${rows}</tbody></table>`;
};

window.calcCosts=function(){
  const purchase=parseFloat(document.getElementById('cc-purchase')?.value)||0;
  const rate=parseFloat(document.getElementById('cc-rate')?.value)||5.70;
  const boxWeight=parseFloat(document.getElementById('cc-box-weight')?.value)||0;
  const freightIntl=parseFloat(document.getElementById('cc-freight-intl')?.value)||0;
  const packaging=parseFloat(document.getElementById('cc-packaging')?.value)||0;
  const usDefault=document.getElementById('cc-us-default')?.checked;
  const usFreight=usDefault?5.50:(parseFloat(document.getElementById('cc-us-freight')?.value)||5.50);
  const purchaseUSD=rate>0?purchase/rate:purchase;
  const items=[];
  document.querySelectorAll('.cc-qty').forEach(inp=>{
    const qty=parseInt(inp.value)||0;if(!qty)return;
    const kid=inp.dataset.kid;
    const wt=parseFloat(document.querySelector(`.cc-wt[data-kid="${kid}"]`)?.value)||0;
    const kit=window.state.kits.find(k=>k.id===kid);if(!kit)return;
    items.push({kid,name:kit.name,qty,wt,totalWt:wt*qty});
  });
  const el=document.getElementById('cc-result');if(!el)return;
  if(!items.length){el.innerHTML='';return;}
  const totalWt=items.reduce((a,i)=>a+i.totalWt,0);
  const totalUnits=items.reduce((a,i)=>a+i.qty,0);
  const purchasePerUnit=totalUnits>0?purchaseUSD/totalUnits:0;
  const packagingPerUnit=totalUnits>0?packaging/totalUnits:0;
  let rows='';
  items.forEach(item=>{
    const freightShare=totalWt>0?(item.totalWt/totalWt)*freightIntl/item.qty:0;
    const totalCost=purchasePerUnit+freightShare+packagingPerUnit+usFreight;
    const kit=window.state.kits.find(k=>k.id===item.kid);
    const margin=kit?(kit.salePrice-totalCost)/kit.salePrice*100:0;

window.setKitSearch=function(v){_kitSearch=v;renderKits();};
window.setKitFilter=function(f){

window.renderKits=function(){
  const kCost=kit=>kit.items.reduce((a,i)=>{const b=window.state.books.find(bk=>bk.id===i.bookId);return a+(b?b.costPrice*i.quantity:0);},0);
  // Filter & sort
  let filteredKits=[...window.state.kits];
  const kSalesCount=kit=>window.state.movements.filter(m=>m.type==='saida'&&m.bookId===`kit-${kit.id}`).reduce((a,m)=>a+m.quantity,0);
  const kProfit=kit=>{const cost=kCost(kit);return(parseCur(kit.salePrice)-cost)*kSalesCount(kit);};
  if(_kitSearch){const q=_kitSearch.toLowerCase();filteredKits=filteredKits.filter(k=>k.name.toLowerCase().includes(q));}
  if(_kitFilter==='mais_vendidos')filteredKits.sort((a,b)=>kSalesCount(b)-kSalesCount(a));
  else if(_kitFilter==='mais_lucro')filteredKits.sort((a,b)=>kProfit(b)-kProfit(a));
  else if(_kitFilter==='menos_vendidos')filteredKits.sort((a,b)=>kSalesCount(a)-kSalesCount(b));
  else if(_kitFilter==='estoque')filteredKits=filteredKits.filter(k=>(k.stock||0)>0);
  else if(_kitFilter==='sem_estoque')filteredKits=filteredKits.filter(k=>!(k.stock||0));

    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <div class="kit-view-toggle">
        <button class="kit-view-btn ${_kitView==='card'?'active':''}" onclick="setKitView('card')">⊞ Cards</button>
        <button class="kit-view-btn ${_kitView==='table'?'active':''}" onclick="setKitView('table')">☰ Tabela</button>
      </div>
      <input class="search-input" id="kit-search" placeholder="🔍 Buscar kit..." oninput="setKitSearch(this.value)" style="max-width:240px">
      <div class="filter-tabs" id="kit-filter-tabs">
        <button class="filter-tab active" onclick="setKitFilter('todos')">Todos</button>
        <button class="filter-tab" onclick="setKitFilter('mais_vendidos')">+ Vendidos</button>
        <button class="filter-tab" onclick="setKitFilter('mais_lucro')">+ Rentáveis</button>
        <button class="filter-tab" onclick="setKitFilter('menos_vendidos')">− Vendidos</button>
        <button class="filter-tab" onclick="setKitFilter('estoque')">Com Estoque</button>
        <button class="filter-tab" onclick="setKitFilter('sem_estoque')">Sem Estoque</button>

      <div style="display:flex;gap:6px;margin-left:auto;flex-wrap:wrap"><button class="btn btn-gray" onclick="openShoppingList()">🛒 Lista Compras</button><button class="btn btn-gray" onclick="openCostCalc()">🧮 Calc. Custo</button><button class="btn btn-gray" onclick="openStockAdjust()">📦 Ajuste</button><button class="btn" onclick="openKitModal()">+ Montar Kit</button></div>
    </div>
    ${kitsToShow.length===0?`<div class="card" style="text-align:center;padding:52px"><div style="font-size:44px;margin-bottom:10px">🎁</div><div style="font-size:15px;font-weight:600">Nenhum kit montado</div><div style="font-size:13px;color:var(--sub);margin-top:6px">Ao montar um kit, o estoque dos livros é descontado.</div></div>`:
    _kitView==='table'?`<table style="width:100%;border-collapse:collapse">
    <thead><tr><th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;background:#f8fafc;border-bottom:1px solid var(--border)">Kit</th><th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;background:#f8fafc;border-bottom:1px solid var(--border)">Preço</th><th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;background:#f8fafc;border-bottom:1px solid var(--border)">Custo</th><th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;background:#f8fafc;border-bottom:1px solid var(--border)">Markup</th><th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;background:#f8fafc;border-bottom:1px solid var(--border)">Vendido</th><th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;background:#f8fafc;border-bottom:1px solid var(--border)">Estoque</th><th style="padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;background:#f8fafc;border-bottom:1px solid var(--border)"></th></tr></thead>
    <tbody>${kitsToShow.map(kit=>{const cost=kCost(kit),margin=parseCur(kit.salePrice)>0?((parseCur(kit.salePrice)-cost)/cost*100):0;const sold=window.state.movements.filter(m=>m.type==='saida'&&m.bookId===`kit-${kit.id}`).reduce((a,m)=>a+m.quantity,0);return`<tr style="border-bottom:1px solid #f1f5f9"><td style="padding:10px 12px;font-weight:600;font-size:13px">${kit.name}</td><td style="padding:10px 12px">${BRL(kit.salePrice)}</td><td style="padding:10px 12px;color:var(--sub)">${BRL(cost)}</td><td style="padding:10px 12px"><span style="color:${margin>30?'#10b981':margin>10?'#f59e0b':'#ef4444'};font-weight:600">${margin.toFixed(0)}%</span></td><td style="padding:10px 12px"><span class="badge badge-indigo">${sold}</span></td><td style="padding:10px 12px"><span class="badge ${(kit.stock||0)>2?'badge-green':(kit.stock||0)>0?'badge-amber':'badge-red'}">${kit.stock||0}</span></td><td style="padding:10px 12px"><div style="display:flex;gap:4px"><button class="btn btn-sm" onclick="openKitModal(window.state.kits.find(k=>k.id==='${kit.id}'))">✏️</button><button class="btn btn-sm btn-green" onclick="openSellKitModal('${kit.id}')">💲</button><button class="btn btn-sm" onclick="openBuildMore('${kit.id}')">🔧</button><button class="btn btn-sm btn-red" onclick="delKit('${kit.id}')">🗑️</button></div></td></tr>`;}).join('')}</tbody>
  </table>`:`<div class="kit-grid">${kitsToShow.map(kit=>{
      const cost=kCost(kit),margin=parseCur(kit.salePrice)>0?((parseCur(kit.salePrice)-cost)/cost*100):0;
      return`<div class="kit-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div style="font-size:15px;font-weight:700">🎁 ${kit.name}</div><span class="badge badge-green">${BRL(kit.salePrice)}</span></div>
        ${kit.description?`<div style="font-size:12px;color:var(--sub);margin-bottom:8px">${kit.description}</div>`:''}
        <div style="font-size:12px;color:var(--sub);margin-bottom:4px">Conteúdo:</div>
        ${kit.items.map(item=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return b?`<div style="font-size:12px;padding:2px 0;color:#374151">• ${b.title} × ${item.quantity}</div>`:''}).join('')}
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
          <div style="font-size:11px;color:var(--sub)">Custo<br><strong>${BRL(cost)}</strong></div>
          <div style="font-size:11px;color:var(--sub)">Markup<br><strong style="color:${margin>30?'#10b981':margin>10?'#f59e0b':'#ef4444'}">${margin.toFixed(1)}%</strong></div>
          <div style="font-size:11px;color:var(--sub)">Estoque Kits<br><span class="badge ${kit.stock>0?'badge-green':'badge-red'}">${kit.stock||0}</span></div>
        </div>
        ${kit.stock>0?`<div class="stock-bar"><div class="stock-bar-fill" style="width:${Math.min(100,((kit.stock||0)/Math.max(1,(kit.stock||0)+5))*100)}%"></div></div>`:''}
        <div style="display:flex;gap:6px;margin-top:10px">
          <button class="btn btn-sm btn-green" style="flex:1" onclick="sellKit('${kit.id}')" ${!kit.stock?'disabled':''}>Vender${kit.stock>0?` (${kit.stock})`:'—'}</button>
          <button class="btn btn-sm btn-amber" onclick="buildMoreKit('${kit.id}')">+ Montar</button>
          <button class="btn btn-sm" onclick='openKitModal(${JSON.stringify(kit).replace(/'/g,"&#39;")})'>✏️</button>
          <button class="btn btn-sm btn-red" onclick="delKit('${kit.id}')">🗑️</button>
        </div>
      </div>`;}).join('')}</div>`}`;
};

window.openKitModal=function(kit=null){
  window._kitItems=kit?[...kit.items]:[];
  openModal(kit?'Editar Kit':'Montar Kit',`
    ${fg('Nome do Kit *',inp('kf-name','text',kit?.name||''))}
    ${fg('Descrição',inp('kf-desc','text',kit?.description||'','Descrição do kit'))}
    ${fg('Preço de Venda (R$) *',cinp('kf-price',kit?.salePrice||0))}
    <div class="calc-box warn" id="kit-calc">Adicione livros para calcular o custo.</div>
    <div style="font-size:13px;font-weight:600;margin:4px 0 8px">📚 Livros do Kit</div>
    <div style="display:flex;gap:8px;margin-bottom:10px"><select id="kf-book" onchange="updateKitCalc()" style="flex:2;padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Sora',sans-serif;outline:none"><option value="">Selecione um livro...</option>${window.state.books.map(b=>`<option value="${b.id}">${b.title} (est: ${b.stock})</option>`).join('')}</select><input type="number" id="kf-qty" value="1" min="1" style="width:64px;padding:9px 8px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Sora',sans-serif;outline:none;text-align:center"><button class="btn btn-sm btn-green" onclick="addKitItem()">+ Add</button></div>
    <div id="kit-items-list"></div>
    ${!kit?`<div style="margin-top:10px">${fg('Quantidade de kits a montar *',inp('kf-qty-build','number','1','1'))}<div class="alert alert-amber" style="font-size:12px;margin-top:-6px">⚠️ Ao salvar, o estoque dos livros será descontado.</div></div>`:''}
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button class="btn btn-gray" onclick="closeModal()">Cancelar</button><button class="btn" onclick="saveKit('${kit?.id||''}')">Salvar Kit</button></div>`,false);
  renderKitItemsList();updateKitCalc();
};

function renderKitItemsList(){const el=document.getElementById('kit-items-list');if(!el)return;const items=window._kitItems;el.innerHTML=items.length===0?'<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Nenhum livro adicionado.</div>':items.map((item,i)=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:#f8fafc;border-radius:7px;margin-bottom:4px"><span style="font-size:12px">${b?.title||'?'} × ${item.quantity} <span style="color:var(--sub)">(custo: ${BRL((b?.costPrice||0)*item.quantity)})</span></span><button class="btn btn-sm btn-red" onclick="removeKitItem(${i})">✕</button></div>`;}).join('');}
window.addKitItem=function(){const bookId=document.getElementById('kf-book').value,qty=parseInt(document.getElementById('kf-qty').value)||1;if(!bookId)return;const ex=window._kitItems.findIndex(i=>i.bookId===bookId);if(ex>=0)window._kitItems[ex].quantity+=qty;else window._kitItems.push({bookId,quantity:qty});renderKitItemsList();updateKitCalc();};
window.removeKitItem=function(i){window._kitItems.splice(i,1);renderKitItemsList();updateKitCalc();};
window.saveKit=function(id){
  const d={name:document.getElementById('kf-name').value.trim(),description:document.getElementById('kf-desc').value,salePrice:parseCur(document.getElementById('kf-price').value),items:[...window._kitItems]};
  if(!d.name||!d.salePrice)return alert('Preencha nome e preço.');if(d.items.length===0)return alert('Adicione pelo menos um livro.');
  if(id){window.state.kits=window.state.kits.map(k=>k.id===id?{...k,...d}:k);}
  else{
    const buildQty=parseInt(document.getElementById('kf-qty-build')?.value)||1;
    // Check stock availability
    for(const item of d.items){const b=window.state.books.find(bk=>bk.id===item.bookId);if(!b||b.stock<item.quantity*buildQty)return alert(`Estoque insuficiente de "${b?.title||'?'}"! Disponível: ${b?.stock||0}, necessário: ${item.quantity*buildQty}`);}
    // Deduct stock
    window.state.books=window.state.books.map(b=>{const item=d.items.find(i=>i.bookId===b.id);return item?{...b,stock:b.stock-item.quantity*buildQty}:b;});
    d.stock=buildQty;
    window.state.kits.push({...d,id:genId()});
    saveState('books');
  }
  saveState('kits');closeModal();renderKits();toast(id?'Kit atualizado!':'Kit montado! Estoque descontado.');
};
window.buildMoreKit=function(id){
  const kit=window.state.kits.find(k=>k.id===id);
  openModal(`+ Montar mais: ${kit.name}`,`
    <div style="font-size:13px;color:var(--sub);margin-bottom:14px">Monte mais unidades deste kit, descontando o estoque dos livros.</div>
    ${fg('Quantidade de kits a montar',inp('bm-qty','number','1','1'))}
    <div id="bm-check" class="alert alert-green" style="font-size:12px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="confirmBuildMore('${kit.id}')">Montar</button>
    </div>`);
  document.getElementById('bm-qty').addEventListener('input',()=>{
    const qty=parseInt(document.getElementById('bm-qty').value)||1;
    const issues=kit.items.map(item=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return b&&b.stock>=item.quantity*qty?null:`${b?.title}: disponível ${b?.stock}, necessário ${item.quantity*qty}`;}).filter(Boolean);
    const el=document.getElementById('bm-check');el.textContent=issues.length?issues.join('; '):`✅ Estoque suficiente para ${qty} kit(s).`;el.className='alert '+(issues.length?'alert-red':'alert-green');
  });
};
window.confirmBuildMore=function(id){const kit=window.state.kits.find(k=>k.id===id),qty=parseInt(document.getElementById('bm-qty').value)||1;for(const item of kit.items){const b=window.state.books.find(bk=>bk.id===item.bookId);if(!b||b.stock<item.quantity*qty)return alert(`Estoque insuficiente de "${b?.title}"!`);}window.state.books=window.state.books.map(b=>{const item=kit.items.find(i=>i.bookId===b.id);return item?{...b,stock:b.stock-item.quantity*qty}:b;});window.state.kits=window.state.kits.map(k=>k.id===id?{...k,stock:(k.stock||0)+qty}:k);saveState('books');saveState('kits');closeModal();renderKits();toast(`${qty} kit(s) montado(s)!`);};
window.delKit=function(id){if(!confirm('Excluir kit? (o estoque dos livros NÃO será devolvido)'))return;window.state.kits=window.state.kits.filter(k=>k.id!==id);saveState('kits');renderKits();};
window.sellKit=function(id){const kit=window.state.kits.find(k=>k.id===id);if(!kit.stock)return alert('Sem estoque de kits!');openModal(`Vender Kit: ${kit.name}`,`${fg('Quantidade de kits',inp('sk-qty','number','1','1'))}<div class="fg"><label>Cliente</label><select id="sk-client" style="width:100%"><option value="">Sem cliente</option>${window.state.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>${fg('Data',inp('sk-date','date',today()))}<div class="alert alert-green">Preço unitário: <strong>${BRL(kit.salePrice)}</strong> | Estoque disponível: <strong>${kit.stock}</strong></div><div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-gray" onclick="closeModal()">Cancelar</button><button class="btn btn-green" onclick="confirmSellKit('${kit.id}')">Confirmar Venda</button></div>`);};
window.confirmSellKit=function(id){const kit=window.state.kits.find(k=>k.id===id),qty=parseInt(document.getElementById('sk-qty').value)||1;if(qty>kit.stock)return alert(`Só há ${kit.stock} kit(s) disponíveis!`);const clientId=document.getElementById('sk-client').value,client=clientId?window.state.clients.find(c=>c.id===clientId):null,date=document.getElementById('sk-date').value;window.state.movements.push({id:genId(),type:'saida',bookId:`kit-${kit.id}`,bookTitle:`Kit: ${kit.name}`,quantity:qty,unitPrice:parseCur(kit.salePrice),freightCost:0,clientId,clientName:client?.name||'',date,notes:`Kit: ${kit.name}`});window.state.kits=window.state.kits.map(k=>k.id===id?{...k,stock:k.stock-qty}:k);saveState('movements');saveState('kits');closeModal();renderKits();toast('Venda registrada!');};

// ── RELATÓRIOS ───────────────────────────────────────────────────────────
function renderRelatorios(){
  const S=window.state;
  const tRev=S.movements.filter(m=>m.type==='saida').reduce((a,m)=>a+m.quantity*m.unitPrice,0);
  const tCost=S.movements.filter(m=>m.type==='entrada').reduce((a,m)=>a+m.quantity*m.unitPrice,0);
  const tExp=S.expenses.reduce((a,e)=>a+parseCur(e.amount),0);
  const profit=tRev-tCost-tExp;
  const now=new Date(),lbl=[],rv=[],ex=[],lu=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);lbl.push(d.toLocaleDateString('pt-BR',{month:'short'}).replace('.',''));const mo=d.getMonth(),yr=d.getFullYear(),r=S.movements.filter(mv=>mv.type==='saida'&&new Date(mv.date).getMonth()===mo&&new Date(mv.date).getFullYear()===yr).reduce((a,mv)=>a+mv.quantity*mv.unitPrice,0),e=S.expenses.filter(ex=>new Date(ex.date).getMonth()===mo&&new Date(ex.date).getFullYear()===yr).reduce((a,ex)=>a+parseCur(ex.amount),0);rv.push(+r.toFixed(2));ex.push(+e.toFixed(2));lu.push(+(r-e).toFixed(2));}
  // Top sold + most profitable — include KITS
  const allItems=[
    ...S.kits.map(k=>({id:`kit-${k.id}`,title:k.name,salePrice:k.salePrice,costPrice:k.costPrice,category:'Kits',isKit:true})),
    ...S.books.map(b=>({...b,isKit:false}))
  ];
  const bookStats=allItems.map(b=>{
    const sold=S.movements.filter(m=>m.type==='saida'&&m.bookId===b.id).reduce((a,m)=>a+m.quantity,0);
    const revenue=S.movements.filter(m=>m.type==='saida'&&m.bookId===b.id).reduce((a,m)=>a+m.quantity*m.unitPrice,0);
    const cogs=S.movements.filter(m=>m.type==='saida'&&m.bookId===b.id).reduce((a,m)=>a+(m.cogs||b.costPrice*m.quantity),0);
    const costOfSold=cogs||sold*b.costPrice;
    const profit=revenue-costOfSold;
    return{...b,sold,revenue,profit,markup:b.costPrice>0?((b.salePrice-b.costPrice)/b.costPrice*100):0};
  }).filter(b=>b.sold>0);
  const topSold=[...bookStats].sort((a,b)=>b.sold-a.sold).slice(0,6);
  const topProfit=[...bookStats].sort((a,b)=>b.profit-a.profit).slice(0,6);
  const catRev=[{name:'Kits',value:+S.movements.filter(m=>m.type==='saida'&&m.bookId?.startsWith('kit-')).reduce((a,m)=>a+m.quantity*m.unitPrice,0).toFixed(2)},...BCATS.map(cat=>{const v=S.movements.filter(m=>m.type==='saida'&&!m.bookId?.startsWith('kit-')).reduce((a,m)=>{const b=S.books.find(bk=>bk.id===m.bookId);return b?.category===cat?a+m.quantity*m.unitPrice:a;},0);return{name:cat,value:+v.toFixed(2)};})].filter(c=>c.value>0).sort((a,b)=>b.value-a.value).slice(0,6);
  const catExp=window.state.expenseCategories.map(cat=>({name:cat,value:+S.expenses.filter(e=>e.category===cat).reduce((a,e)=>a+parseCur(e.amount),0).toFixed(2)})).filter(c=>c.value>0);
  document.getElementById('content').innerHTML=`
    <div class="grid4" style="margin-bottom:14px">${statCard('📈','Receita Total',BRL(tRev),'#10b981','')}${statCard('📉','Custo Compras',BRL(tCost),'#ef4444','')}${statCard('💸','Despesas',BRL(tExp),'#f59e0b','')}${statCard('💰','Lucro Líquido',BRL(profit),profit>=0?'#10b981':'#ef4444','')}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">📊 Tendência Mensal</div><div class="chart-wrap"><canvas id="rpt-line"></canvas></div></div>
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">🥧 Despesas por Categoria</div>${catExp.length===0?'<div style="text-align:center;color:var(--muted);padding:40px">Sem despesas.</div>':`<div class="chart-wrap"><canvas id="rpt-pie"></canvas></div>`}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">🏆 Mais Vendidos</div>${tbl([{label:'Livro',render:r=>`<div style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${r.title}</div>`},{label:'Unid.',render:r=>`<span class="badge badge-indigo">${r.sold}</span>`},{label:'Receita',render:r=>`<strong style="color:#10b981">${BRL(r.revenue)}</strong>`}],topSold,'Nenhuma venda.')}</div>
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">💰 Mais Rentáveis</div>${tbl([{label:'Livro',render:r=>`<div style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${r.title}</div>`},{label:'Markup',render:r=>`<span class="badge ${r.markup>30?'badge-green':r.markup>10?'badge-amber':'badge-red'}">${r.markup.toFixed(1)}%</span>`},{label:'Lucro',render:r=>`<strong style="color:#10b981">${BRL(r.profit)}</strong>`}],topProfit,'Nenhuma venda.')}</div>
    </div>
    <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">📂 Receita por Categoria</div>${catRev.length===0?'<div style="text-align:center;color:var(--muted);padding:24px">Sem dados.</div>':`<div class="chart-wrap"><canvas id="rpt-bar"></canvas></div>`}</div>`;
  setTimeout(()=>{
    charts['line']=safeChart('rpt-line',{type:'line',data:{labels:lbl,datasets:[{label:'Receita',data:rv,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)',tension:.3,fill:true,pointRadius:4},{label:'Despesas',data:ex,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.05)',tension:.3,fill:true,pointRadius:4},{label:'Lucro',data:lu,borderColor:'#6366f1',tension:.3,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Sora'},boxWidth:12}}},scales:{x:{grid:{display:false},ticks:{font:{family:'Sora',size:11}}},y:{ticks:{font:{family:'Sora',size:11},callback:v=>'R$'+v}}}}});
    if(catExp.length)charts['pie']=safeChart('rpt-pie',{type:'doughnut',data:{labels:catExp.map(c=>c.name),datasets:[{data:catExp.map(c=>c.value),backgroundColor:['#6366f1','#f59e0b','#10b981','#ef4444','#3b82f6','#8b5cf6'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Sora'},boxWidth:12}}}}});
    if(catRev.length)charts['bar']=safeChart('rpt-bar',{type:'bar',data:{labels:catRev.map(c=>c.name),datasets:[{data:catRev.map(c=>c.value),backgroundColor:'#6366f1',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{family:'Sora',size:11},callback:v=>'R$'+v}},y:{grid:{display:false},ticks:{font:{family:'Sora',size:11}}}}}});
  },50);
}

window.restoreBackup=async function(input){

    for(const key of keys){if(data[key]!==undefined){window.state[key]=data[key];await setDoc(doc(db,COLL,key),{items:data[key]});}}

function ssHtml(id, options, placeholder){
  const opts = options.map(o=>`<div class="ss-item" data-val="${o.value}" data-lbl="${(o.label||'').replace(/"/g,'&quot;')}" onclick="ssPick('${id}',this)">${o.label}</div>`).join('');
  return `<div class="ss-wrap"><input class="ss-input" id="${id}-txt" placeholder="${placeholder||'Buscar...'}" autocomplete="off" oninput="ssFilter('${id}')" onfocus="ssOpen('${id}')" onblur="setTimeout(()=>ssClose('${id}'),200)"><div class="ss-drop" id="${id}-drop">${opts}</div><input type="hidden" id="${id}" value=""></div>`;
}
window.ssFilter=function(id){
  const q=(document.getElementById(id+'-txt')?.value||'').toLowerCase();
  const drop=document.getElementById(id+'-drop');
  if(!drop) return;
  let any=false;
  drop.querySelectorAll('.ss-item').forEach(el=>{
    const show=el.dataset.lbl.toLowerCase().includes(q);
    el.style.display=show?'':'none';
    if(show)any=true;
  });
  let empty=drop.querySelector('.ss-empty');
  if(!any){if(!empty){empty=document.createElement('div');empty.className='ss-empty';empty.textContent='Nenhum resultado';drop.appendChild(empty);}empty.style.display='';}
  else if(empty) empty.style.display='none';
  ssOpen(id);
};
window.ssOpen=function(id){const d=document.getElementById(id+'-drop');if(d)d.style.display='block';};
window.ssClose=function(id){const d=document.getElementById(id+'-drop');if(d)d.style.display='none';};
window.ssPick=function(id,el){
  document.getElementById(id+'-txt').value=el.dataset.lbl;
  document.getElementById(id).value=el.dataset.val;
  ssClose(id);
  if(id==='ms-book-0'||id.startsWith('ms-book-'))autoItemPrice(id.split('-')[2]||0);
};
window.ssSet=function(id,val,lbl){
  const inp=document.getElementById(id);const txt=document.getElementById(id+'-txt');
  if(inp)inp.value=val;if(txt)txt.value=lbl||val;
};

const SHOPIFY_MAP=[
  {f:'Raízes Brasileiras',kid:'k03'},{f:'Mega Combo Herança',kid:'k04'},
  {f:'Super Combo Devocional Infantil',kid:'k06'},{f:'Super Combo Devocional Completo',kid:'k06'},
  {f:'Divertidamente',kid:'k10'},{f:'Divertida Mente',kid:'k10'},
  {f:'Meu Primeiro Altar',kid:'k14'},{f:'Tesouro Bíblico',kid:'k12'},
  {f:'Exploradores da Natureza',kid:'k09'},{f:'Banho Explorador',kid:'k02'},
  {f:'Banho Cristão',kid:'k01'},{f:'Pack',f2:'Mônica',kid:'k08'},
  {f:'Biblioteca',f2:'Mônica',kid:'k11'},{f:'Duo',f2:'Palavrinhas',kid:'k13'},
  {f:'Expedição Safári',kid:'k07'},{f:'Embalagem',kid:null},
];

function findKit(name){
  if(!name)return null;const n=name.toLowerCase();
  for(const m of SHOPIFY_MAP){
    if(n.includes(m.f.toLowerCase())){if(m.f2&&!n.includes(m.f2.toLowerCase()))continue;return m.kid;}
  }return null;
}

function csvRow(row){
  const cells=[];let cur='',inQ=false;
  for(let i=0;i<row.length;i++){const ch=row[i];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cells.push(cur.trim());cur='';}else{cur+=ch;}}
  cells.push(cur.trim());return cells;
}

window.importShopifyCSV=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const lines=e.target.result.split('\n').filter(l=>l.trim());
      const headers=csvRow(lines[0]).map(h=>h.replace(/^"|"$/g,''));
      const gi=h=>headers.findIndex(x=>x===h);
      const gc=(cells,h)=>{const i=gi(h);return i>=0?(cells[i]||'').replace(/^"|"$/g,'').trim():'';};
      const orders={};
      for(let i=1;i<lines.length;i++){
        const cells=csvRow(lines[i]);if(cells.length<5)continue;
        const name=gc(cells,'Name');if(!name)continue;
        if(!orders[name]){orders[name]={name,date:(gc(cells,'Paid at')||gc(cells,'Created at')).slice(0,10),status:gc(cells,'Financial Status'),total:parseFloat(gc(cells,'Total'))||0,discCode:gc(cells,'Discount Code'),items:[]};}
        const iN=gc(cells,'Lineitem name'),iQ=parseInt(gc(cells,'Lineitem quantity'))||1,iP=parseFloat(gc(cells,'Lineitem price'))||0,iD=parseFloat(gc(cells,'Lineitem discount'))||0;
        if(iN)orders[name].items.push({iN,iQ,iP,iD});
      }
      const rows=[];
      for(const o of Object.values(orders)){
        const fee=o.total>0?+(o.total*0.029+0.30).toFixed(2):0;
        for(const item of o.items){
          const kid=findKit(item.iN),kit=kid?window.state.kits.find(k=>k.id===kid):null;
          const net=item.iP-(item.iD/item.iQ||0);
          rows.push({order:o.name,date:o.date,discCode:o.discCode,iN:item.iN,iQ:item.iQ,iP:item.iP,iD:item.iD,net,kid,kitName:kit?kit.name:'❓ Não mapeado',fee,total:o.total});
        }
      }
      const mapped=rows.filter(r=>r.kid),unmapped=rows.filter(r=>!r.kid&&!r.iN.toLowerCase().includes('embalagem'));
      const totalRev=rows.reduce((a,r)=>a+r.net*r.iQ,0);
      openModal('📥 Importação Shopify — Preview',`
        <div class="alert ${unmapped.length?'alert-amber':'alert-green'}" style="margin-bottom:12px">
          ✅ ${mapped.length} item(s) mapeado(s) | ${unmapped.length} sem mapeamento | Receita líquida: <strong>$${totalRev.toFixed(2)}</strong>
        </div>
        ${unmapped.length?`<div class="alert alert-amber" style="font-size:12px;margin-bottom:12px">Não reconhecidos: ${[...new Set(unmapped.map(r=>r.iN))].slice(0,3).join(' | ')}</div>`:''}
        <div style="max-height:280px;overflow-y:auto;margin-bottom:14px"><table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:#f8fafc"><th style="padding:6px 10px">Pedido</th><th>Data</th><th>Kit</th><th>Qtd</th><th>Preço</th><th>Taxa Shopify</th></tr></thead>
          <tbody>${rows.map(r=>`<tr style="border-bottom:1px solid #f1f5f9"><td style="padding:5px 10px;font-weight:600">${r.order}</td><td style="padding:5px 10px">${r.date}</td><td style="padding:5px 10px"><span class="badge ${r.kid?'badge-green':'badge-red'}">${r.kitName}</span></td><td style="padding:5px 10px;text-align:center">${r.iQ}</td><td style="padding:5px 10px;text-align:right">$${r.net.toFixed(2)}</td><td style="padding:5px 10px;text-align:right;color:#6366f1">$${r.fee.toFixed(2)}</td></tr>`).join('')}</tbody>
        </table></div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-green" onclick="confirmShopifyImport()" ${!mapped.length?'disabled':''}>✅ Importar ${mapped.length} item(s)</button>
        </div>`,true);
      window._sRows=rows;
    }catch(err){toast('Erro ao ler CSV: '+err.message,'error');console.error(err);}
  };
  reader.readAsText(file);input.value='';
};

window.confirmShopifyImport=function(){
  const rows=window._sRows||[];let imported=0,skipped=0;const seenO=new Set();
  for(const r of rows){
    if(!r.kid){skipped++;continue;}
    const kit=window.state.kits.find(k=>k.id===r.kid);if(!kit){skipped++;continue;}
    const dup=window.state.movements.some(m=>m.notes&&m.notes.includes(r.order)&&m.bookId===`kit-${r.kid}`);if(dup){skipped++;continue;}
    const fee=seenO.has(r.order)?0:r.fee;seenO.add(r.order);
    window.state.movements.push({id:genId(),type:'saida',bookId:`kit-${r.kid}`,bookTitle:`Kit: ${kit.name}`,quantity:r.iQ,unitPrice:r.net,grossUnitPrice:r.iP,freightCost:0,freightImport:0,freightBR:0,clientId:'',clientName:'',ugcCode:r.discCode||'',discountPct:r.iD>0?+(r.iD/r.iP/r.iQ*100).toFixed(1):0,shopifyFee:fee,date:r.date,notes:`Shopify ${r.order}`,source:'shopify'});
    window.state.kits=window.state.kits.map(k=>k.id===r.kid?{...k,stock:Math.max(0,(k.stock||0)-r.iQ)}:k);
    imported++;
  }
  saveState('movements');saveState('kits');closeModal();
  toast(`✅ ${imported} importado(s)${skipped?` | ${skipped} ignorado(s)`:''}!`);renderMovimentos();
};


window.renderDashboard=renderDashboard;window.renderLivros=renderLivros;window.renderClientes=renderClientes;window.renderFornecedores=renderFornecedores;window.renderDespesas=renderDespesas;window.renderRelatorios=renderRelatorios;window.renderConfig=renderConfig;window.saveState=saveState;

function renderPage(p){
  const map={dashboard:renderDashboard,livros:renderLivros,movimentos:window.renderMovimentos,kits:window.renderKits,clientes:renderClientes,fornecedores:renderFornecedores,despesas:renderDespesas,relatorios:renderRelatorios,ugc:renderUgc,config:renderConfig};
  if(map[p])map[p]();
}

// ── BOOT ─────────────────────────────────────────────────────────────────
document.getElementById('top-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
initFirebase().then(()=>{
  onAuthStateChanged(auth,async user=>{
    if(user){
      currentUser=user;
      document.getElementById('auth-screen').style.display='none';
      const uname=user.displayName||user.email;
      document.getElementById('sb-avatar').textContent=uname[0].toUpperCase();
      document.getElementById('sb-uname').textContent=uname;
      document.getElementById('sb-uemail').textContent=user.email;
      if(!window._dataLoaded){await loadState();window._dataLoaded=true;setupRealtime();}
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      buildNav();renderPage('dashboard');
      if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
      // Keep-alive: ping server every 4min to prevent container sleeping
      setInterval(()=>fetch('/health').catch(()=>{}), 4*60*1000);
    }else{
      currentUser=null;window._dataLoaded=false;stopListeners();
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('app').style.display='none';
      document.getElementById('auth-screen').style.display='flex';
      const lb=document.getElementById('login-btn');if(lb){lb.disabled=false;lb.textContent='Entrar';}
    }
  });
}).catch(err=>{setLoadMsg('❌ '+err.message);document.querySelector('.spinner').style.display='none';});

// ── MOBILE SIDEBAR ──────────────────────────────────────
window.toggleSidebar=function(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('mob-overlay');
  const isOpen=sb.classList.contains('open');
  if(isOpen){sb.classList.remove('open');ov.classList.remove('show');}
  else{sb.classList.add('open');ov.classList.add('show');}
};
window.closeSidebar=function(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('show');
};
// Auto-close sidebar on nav click (mobile)
const _origGoto=window.goto;
window.goto=function(page){
  closeSidebar();
  _origGoto(page);
};
</script>
