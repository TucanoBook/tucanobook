<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0f172a"><title>TucanoBook — Gestão</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:#f0f4f8;color:#1a2332;height:100vh;overflow:hidden}
:root{--navy:#0f172a;--indigo:#6366f1;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--bg:#f0f4f8;--card:#fff;--border:#e2e8f0;--text:#0f172a;--sub:#64748b;--muted:#94a3b8}
#loading-screen{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
#loading-screen h2{color:#fff;font-size:22px;font-weight:700}#loading-screen p{color:#64748b;font-size:13px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#312e81 100%);display:none;align-items:center;justify-content:center;z-index:500;padding:16px}
.auth-card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.auth-logo{text-align:center;margin-bottom:28px}.auth-logo span{font-size:44px}
.auth-logo h1{font-size:22px;font-weight:700;color:var(--text);margin-top:8px}.auth-logo p{font-size:13px;color:var(--sub);margin-top:4px}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:24px}
.auth-tab{padding:9px 0;text-align:center;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);border:none;background:transparent;font-family:'Sora',sans-serif;transition:all .15s}
.auth-tab.active{background:#fff;color:var(--indigo);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.auth-form{display:none}.auth-form.active{display:block}
.auth-fg{margin-bottom:14px}.auth-fg label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:5px}
.auth-fg input,.auth-fg select{width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid var(--border);font-size:14px;color:var(--text);font-family:'Sora',sans-serif;outline:none;transition:border-color .15s}
.auth-fg input:focus,.auth-fg select:focus{border-color:var(--indigo)}
.auth-btn{width:100%;padding:12px;background:var(--indigo);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;margin-top:4px;transition:opacity .15s}
.auth-btn:hover{opacity:.88}.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-link{text-align:center;font-size:12px;color:var(--sub);margin-top:14px}.auth-link a{color:var(--indigo);cursor:pointer;font-weight:600}
.auth-err{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;border-radius:8px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:none}
.auth-ok{background:#f0fdf4;border:1px solid #86efac;color:#166534;border-radius:8px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:none}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:224px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo h1{color:#fff;font-size:15px;font-weight:700}.sb-logo small{color:#475569;font-size:11px;margin-top:2px;display:block}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-section{padding:14px 16px 3px;color:#475569;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:#94a3b8;font-size:13px;border-left:3px solid transparent;transition:all .12s}
.nav-item:hover{color:#cbd5e1;background:rgba(255,255,255,.04)}
.nav-item.active{color:#fff;font-weight:600;background:rgba(99,102,241,.18);border-left-color:#6366f1}
.sb-user{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{font-size:12px;color:#cbd5e1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-uemail{font-size:10px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{width:100%;padding:7px;background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.2);border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;padding:12px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.topbar h2{font-size:17px;font-weight:700}.topbar p{font-size:12px;color:var(--sub);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:18px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid var(--border)}
.stat-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid var(--border)}
.stat-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:24px;font-weight:700;color:var(--text);margin-top:5px}.stat-sub{font-size:12px;color:var(--sub);margin-top:3px}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;background:#f8fafc;border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;color:#374151;border-bottom:1px solid #f1f5f9}
tr:hover td{background:#fafbff}.empty-row td{text-align:center;color:var(--muted);padding:32px 14px}
.btn{background:var(--indigo);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:'Sora',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.88}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}.btn-gray{background:#e2e8f0;color:#475569}.btn-blue{background:var(--blue)}.btn-amber{background:var(--amber)}.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.fg{margin-bottom:13px}.fg label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;color:var(--text);font-family:'Sora',sans-serif;background:#fff;transition:border-color .15s;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--indigo)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}.badge-red{background:#fee2e2;color:#dc2626}.badge-indigo{background:#eef2ff;color:#4338ca}.badge-amber{background:#fef3c7;color:#92400e}.badge-blue{background:#dbeafe;color:#1d4ed8}.badge-gray{background:#f1f5f9;color:#475569}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:680px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-head h3{font-size:17px;font-weight:700;color:var(--text)}.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--sub)}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-btn{padding:10px 0;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;font-family:'Sora',sans-serif;transition:all .15s}
.filter-tabs{display:flex;gap:6px}
.filter-tab{background:#e2e8f0;color:#475569;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif}
.filter-tab.active{background:var(--indigo);color:#fff}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.alert-green{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.alert-red{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}
.alert-amber{background:#fffbeb;border:1px solid #fcd34d;color:#92400e}
.alert-blue{background:#eff6ff;border:1px solid #93c5fd;color:#1d4ed8}
.search-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search-input{flex:1;min-width:220px;max-width:320px;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Sora',sans-serif;outline:none}
.search-input:focus{border-color:var(--indigo)}
.chart-wrap{position:relative;height:200px}
.kit-card{background:#fff;border-radius:12px;padding:18px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.07)}
.kit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}.toast.success{background:#065f46;border-left:4px solid #10b981}.toast.error{background:#7f1d1d;border-left:4px solid #ef4444}
/* Sub-tabs */
.sub-tabs{display:flex;gap:0;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:20px;width:fit-content}
.sub-tab{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);border:none;background:transparent;font-family:'Sora',sans-serif;transition:all .15s}
.sub-tab.active{background:#fff;color:var(--indigo);box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* Calc box */
.calc-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:9px 13px;font-size:12px;color:#166534;margin-top:-6px;margin-bottom:13px}
.calc-box.warn{background:#fffbeb;border-color:#fcd34d;color:#92400e}
/* Currency input */
.currency-wrap{position:relative}
.currency-wrap::before{content:'R$';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--sub);pointer-events:none}
.currency-wrap input{padding-left:30px !important}
/* User hero */
.user-hero{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;padding:20px;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.user-hero-av{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0}
/* Tag pill */
.tag{display:inline-flex;align-items:center;gap:5px;background:#f1f5f9;border-radius:20px;padding:4px 12px;font-size:12px;color:#374151;font-weight:500;margin:3px}
.tag button{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:14px;line-height:1;padding:0}
/* Kit stock bar */
.stock-bar{height:4px;background:#e2e8f0;border-radius:2px;margin-top:8px}
.stock-bar-fill{height:100%;border-radius:2px;background:#10b981;transition:width .3s}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

/* ── MOBILE RESPONSIVE ───────────────────────────────── */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none;z-index:201}
.hamburger span{display:block;width:22px;height:2px;background:#374151;border-radius:2px;transition:all .3s}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:198}
.mob-overlay.show{display:block}
@media(max-width:768px){
  .hamburger{display:flex}
  .app{flex-direction:column}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;z-index:199;-webkit-transform:translateX(-240px);transform:translateX(-240px);-webkit-transition:-webkit-transform .28s cubic-bezier(.4,0,.2,1);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(0,0,0,.3)}
  .sidebar.open{-webkit-transform:translateX(0);transform:translateX(0)}
  .main{width:100%;min-width:0}
  .topbar{padding:10px 14px}
  .topbar h2{font-size:15px}.topbar p{font-size:11px}
  .content{padding:12px 10px}
  .grid4{grid-template-columns:1fr 1fr !important}
  .grid3{grid-template-columns:1fr 1fr !important}
  .grid2{grid-template-columns:1fr !important}
  .stat-value{font-size:18px !important}
  .stat-card,.card{padding:14px 12px}
  /* Dashboard 2-col → 1-col */
  div[style*="grid-template-columns:2fr 1fr"]{display:block !important}
  div[style*="grid-template-columns:2fr 1fr"] > *{margin-bottom:12px}
  div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;display:grid !important}
  div[style*="grid-template-columns:330px"]{display:block !important}
  div[style*="grid-template-columns:330px"] > *{margin-bottom:12px}
  div[style*="grid-template-columns:340px"]{display:block !important}
  div[style*="grid-template-columns:340px"] > *{margin-bottom:12px}
  div[style*="grid-template-columns:300px"]{display:block !important}
  div[style*="grid-template-columns:300px"] > *{margin-bottom:12px}
  div[style*="grid-template-columns:repeat(auto-fill"]{grid-template-columns:1fr !important}
  /* Tables scroll */
  div[style*="overflow-x:auto"]{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:540px}
  /* Topbar */
  .topbar{gap:8px}
  #top-date{display:none}
  /* Kit grid */
  .kit-grid{grid-template-columns:1fr !important}
  /* Filter tabs wrap */
  .filter-tabs{flex-wrap:wrap}
  /* Auth card */
  .auth-card{padding:24px 18px}
  /* Modal */
  .modal,.modal-lg{max-width:100% !important;margin:0;border-radius:12px}
  .overlay{align-items:flex-end;padding:0}
  .modal,.modal-lg{border-radius:16px 16px 0 0;max-height:85vh}
  /* User hero */
  .user-hero{flex-direction:column;text-align:center;gap:10px}
  /* Sub tabs */
  .sub-tabs{width:100% !important;display:grid;grid-template-columns:1fr 1fr 1fr}
  .sub-tab{padding:8px 4px;font-size:12px}
}
@media(max-width:400px){
  .grid4{grid-template-columns:1fr !important}
  .stat-value{font-size:16px !important}
}

  .action-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  @media(max-width:700px){.action-btns{grid-template-columns:1fr 1fr}}
  .action-btn{padding:20px 16px 16px;border-radius:16px;cursor:pointer;text-align:left;transition:all .2s;font-family:'Sora',sans-serif;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);border:none}
  .action-btn:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.13)}
  .action-btn .ab-icon{font-size:30px;margin-bottom:8px;display:block}
  .action-btn .ab-label{font-size:14px;font-weight:700;display:block;margin-bottom:2px}
  .action-btn .ab-sub{font-size:11px;opacity:.65;display:block}
  .action-btn.ab-saida{background:linear-gradient(135deg,#fff5f5,#ffe4e4);color:#991b1b}
  .action-btn.ab-entrada{background:linear-gradient(135deg,#f0fdf4,#dcfce7);color:#14532d}
  .action-btn.ab-brinde{background:linear-gradient(135deg,#faf5ff,#ede9fe);color:#4c1d95}
  .action-btn.ab-perda{background:linear-gradient(135deg,#fffbeb,#fef3c7);color:#78350f}
  .action-btn.ab-saida:hover{background:linear-gradient(135deg,#fee2e2,#fca5a5)}
  .action-btn.ab-entrada:hover{background:linear-gradient(135deg,#dcfce7,#bbf7d0)}
  .action-btn.ab-brinde:hover{background:linear-gradient(135deg,#ede9fe,#ddd6fe)}
  .action-btn.ab-perda:hover{background:linear-gradient(135deg,#fef3c7,#fde68a)}
  /* Searchable select */
  .ss-wrap{position:relative;flex:1}
  .ss-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Sora',sans-serif;outline:none;background:#fff;color:var(--fg)}
  .ss-input:focus{border-color:#6366f1}
  .ss-drop{display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1.5px solid #6366f1;border-radius:8px;max-height:200px;overflow-y:auto;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.12)}
  .ss-item{padding:9px 14px;font-size:13px;cursor:pointer}
  .ss-item:hover{background:#f0f4ff}
  .ss-empty{padding:9px 14px;font-size:12px;color:var(--sub);font-style:italic}
  /* Total bar */
  .mov-total{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;color:#166534;margin-bottom:10px;text-align:right;display:none}

  .month-select{padding:9px 16px;border:2px solid var(--border);border-radius:10px;font-size:13px;outline:none;cursor:pointer;min-width:200px}
</style>
</head>
<body>
<div id="loading-screen"><div style="font-size:44px">📖</div><h2>TucanoBook</h2><div class="spinner"></div><p id="loading-msg">Conectando...</p></div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><span>📖</span><h1>TucanoBook</h1><p>Sistema de gestão de livraria</p></div>
    <div class="auth-tabs" id="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Cadastrar</button>
    </div>
    <div class="auth-form active" id="form-login">
      <div class="auth-err" id="login-err"></div>
      <div class="auth-fg"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="auth-fg"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="auth-btn" id="login-btn" onclick="doLogin()">Entrar</button>
      <div class="auth-link"><a onclick="switchAuthTab('reset')">Esqueci minha senha</a></div>
    </div>
    <div class="auth-form" id="form-register">
      <div class="auth-err" id="reg-err"></div>
      <div class="auth-fg"><label>Nome completo</label><input type="text" id="reg-name" placeholder="Seu nome" autocomplete="name"></div>
      <div class="auth-fg"><label>E-mail</label><input type="email" id="reg-email" placeholder="seu@email.com"></div>
      <div class="auth-fg"><label>Senha</label><input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres"></div>
      <div class="auth-fg"><label>Confirmar senha</label><input type="password" id="reg-pass2" placeholder="Repita a senha"></div>
      <div class="auth-fg"><label>Perfil</label><select id="reg-role"><option value="usuario">Usuário</option><option value="gerente">Gerente</option><option value="admin">Administrador</option></select></div>
      <button class="auth-btn" id="reg-btn" onclick="doRegister()">Criar conta</button>
    </div>
    <div class="auth-form" id="form-reset">
      <div class="auth-err" id="reset-err"></div><div class="auth-ok" id="reset-ok"></div>
      <p style="font-size:13px;color:var(--sub);margin-bottom:16px">Informe seu e-mail para receber o link de redefinição.</p>
      <div class="auth-fg"><label>E-mail</label><input type="email" id="reset-email" placeholder="seu@email.com"></div>
      <button class="auth-btn" id="reset-btn" onclick="doReset()">Enviar link de recuperação</button>
      <div class="auth-link"><a onclick="switchAuthTab('login')">← Voltar para o login</a></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="mob-overlay" id="mob-overlay" onclick="closeSidebar()"></div>
<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sb-logo"><h1>🦜 TucanoBook</h1><small>Gestão TucanoBook</small></div>
    <nav class="sb-nav" id="nav"></nav>
    <div class="sb-user">
      <div class="sb-user-row">
        <div class="sb-avatar" id="sb-avatar">?</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';

let db,auth,currentUser=null;

async function initFirebase(){
  setLoadMsg('Carregando configuração...');
  const res=await fetch('/api/config');
  if(!res.ok)throw new Error(await res.text());
  const config=await res.json();

  try{await enableIndexedDbPersistence(db);}catch(_){}
}

// ── AUTH UI ──────────────────────────────────────────────────────────────
window.switchAuthTab=function(tab){
  ['login','register','reset'].forEach(t=>document.getElementById('form-'+t).classList.toggle('active',t===tab));
  const tabs=document.querySelectorAll('.auth-tab');
  tabs[0].classList.toggle('active',tab==='login');tabs[1].classList.toggle('active',tab==='register');
  document.getElementById('auth-tabs').style.display=tab==='reset'?'none':'grid';
};
function authErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display=msg?'block':'none';}
function fbMsg(c){return{'auth/user-not-found':'Usuário não encontrado.','auth/wrong-password':'Senha incorreta.','auth/invalid-email':'E-mail inválido.','auth/email-already-in-use':'E-mail já em uso.','auth/weak-password':'Senha fraca — mínimo 6 caracteres.','auth/too-many-requests':'Muitas tentativas. Tente mais tarde.','auth/invalid-credential':'E-mail ou senha incorretos.','auth/network-request-failed':'Erro de conexão.'}[c]||'Erro inesperado.';}
window.doLogin=async function(){const email=document.getElementById('login-email').value.trim(),pass=document.getElementById('login-pass').value;authErr('login-err','');if(!email||!pass)return authErr('login-err','Preencha e-mail e senha.');const btn=document.getElementById('login-btn');btn.disabled=true;btn.textContent='Entrando...';try{await signInWithEmailAndPassword(auth,email,pass);}catch(e){authErr('login-err',fbMsg(e.code));btn.disabled=false;btn.textContent='Entrar';}};
window.doRegister=async function(){const name=document.getElementById('reg-name').value.trim(),email=document.getElementById('reg-email').value.trim(),pass=document.getElementById('reg-pass').value,pass2=document.getElementById('reg-pass2').value,role=document.getElementById('reg-role').value;authErr('reg-err','');if(!name)return authErr('reg-err','Nome é obrigatório.');if(!email)return authErr('reg-err','E-mail é obrigatório.');if(pass.length<6)return authErr('reg-err','Senha: mínimo 6 caracteres.');if(pass!==pass2)return authErr('reg-err','Senhas não coincidem.');const btn=document.getElementById('reg-btn');btn.disabled=true;btn.textContent='Criando...';try{const cred=await createUserWithEmailAndPassword(auth,email,pass);await updateProfile(cred.user,{displayName:name});await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,name,email,role,createdAt:new Date().toISOString(),status:'ativo'});toast('Conta criada! 🎉');}catch(e){authErr('reg-err',fbMsg(e.code));btn.disabled=false;btn.textContent='Criar conta';}};
window.doReset=async function(){const email=document.getElementById('reset-email').value.trim();authErr('reset-err','');document.getElementById('reset-ok').style.display='none';if(!email)return authErr('reset-err','Digite seu e-mail.');const btn=document.getElementById('reset-btn');btn.disabled=true;btn.textContent='Enviando...';try{await sendPasswordResetEmail(auth,email);document.getElementById('reset-ok').textContent='✅ Link enviado! Verifique sua caixa de entrada.';document.getElementById('reset-ok').style.display='block';}catch(e){authErr('reset-err',fbMsg(e.code));}finally{btn.disabled=false;btn.textContent='Enviar link de recuperação';}};
window.doLogout=async function(){if(confirm('Sair da sua conta?'))await signOut(auth);};
document.addEventListener('keydown',e=>{if(e.key!=='Enter')return;if(document.getElementById('form-login').classList.contains('active'))doLogin();if(document.getElementById('form-register').classList.contains('active'))doRegister();if(document.getElementById('form-reset').classList.contains('active'))doReset();});

// ── STATE ────────────────────────────────────────────────────────────────
const COLL='tucanobook';
const BOOKS0=[
  {id:'b1',title:'O Pequeno Príncipe',author:'Antoine de Saint-Exupéry',isbn:'978-85-359-0277-1',category:'Literatura',costPrice:12,salePrice:25,stock:50},
  {id:'b2',title:'Dom Casmurro',author:'Machado de Assis',isbn:'978-85-7638-820-6',category:'Clássicos',costPrice:8,salePrice:18,stock:30},
  {id:'b3',title:'1984',author:'George Orwell',isbn:'978-85-250-6076-2',category:'Ficção Científica',costPrice:15,salePrice:32,stock:20},
  {id:'b4',title:'O Alquimista',author:'Paulo Coelho',isbn:'978-85-260-0408-5',category:'Literatura',costPrice:14,salePrice:29,stock:40},
  {id:'b5',title:'Sapiens',author:'Yuval Noah Harari',isbn:'978-85-254-3526-0',category:'Não-ficção',costPrice:22,salePrice:45,stock:25},
];
window.state={books:[],clients:[],suppliers:[],movements:[],kits:[],expenses:[],expenseCategories:['Custos Fixos','Compra de Estoque','Frete de Compra','Marketing / UGC','Shopify / Taxas','Embalagem','Outros'],ugcCreators:[],partners:[{id:'p1',name:'Sócio 1',email:'',share:50},{id:'p2',name:'Sócio 2',email:'',share:50}]};

let _rtListeners=[];
function stopListeners(){_rtListeners.forEach(u=>u());_rtListeners=[];}

async function loadState(){
  setLoadMsg('Carregando dados...');
  const defs={books:BOOKS0,clients:[],suppliers:[],movements:[],kits:[],expenses:[],expenseCategories:['Custos Fixos','Compra de Estoque','Frete de Compra','Marketing / UGC','Shopify / Taxas','Embalagem','Outros'],ugcCreators:[],partners:[{id:'p1',name:'Sócio 1',email:'',share:50},{id:'p2',name:'Sócio 2',email:'',share:50}]};
  // First load: get current data
  await Promise.all(Object.keys(defs).map(async key=>{
    try{const s=await getDoc(doc(db,COLL,key));window.state[key]=s.exists()?s.data().items:defs[key];}
    catch{window.state[key]=defs[key];}
  }));
}

function setupRealtime(){
  stopListeners();
  const defs={books:BOOKS0,clients:[],suppliers:[],movements:[],kits:[],expenses:[],expenseCategories:['Custos Fixos','Compra de Estoque','Frete de Compra','Marketing / UGC','Shopify / Taxas','Embalagem','Outros'],ugcCreators:[],partners:[{id:'p1',name:'Sócio 1',email:'',share:50},{id:'p2',name:'Sócio 2',email:'',share:50}]};
  let _firstLoad={};
  Object.keys(defs).forEach(key=>{
    _firstLoad[key]=true;
    const unsub=onSnapshot(doc(db,COLL,key),snap=>{
      const newData=snap.exists()?snap.data().items:defs[key];
      if(_firstLoad[key]){_firstLoad[key]=false;return;} // skip first trigger (already loaded)
      const changed=JSON.stringify(newData)!==JSON.stringify(window.state[key]);
      if(changed){
        window.state[key]=newData;
        // Show sync indicator
        const si=document.getElementById('save-indicator');
        if(si){si.textContent='🔄 Sincronizado';si.style.color='#3b82f6';si.style.display='block';clearTimeout(si._t);si._t=setTimeout(()=>{si.style.display='none';si.style.color='#10b981';},2500);}
        // Re-render current page silently
        try{renderPage(curPage);}catch(e){}
      }
    },err=>{
      if(err.code==='permission-denied')console.warn('Realtime: permissão negada para',key);
    });
    _rtListeners.push(unsub);
  });
  console.log('✅ Sincronização em tempo real ativa');
}

let saveTimer={};
window.saveState=function(key){clearTimeout(saveTimer[key]);saveTimer[key]=setTimeout(async()=>{try{await setDoc(doc(db,COLL,key),{items:window.state[key]});showSaved();}catch(e){if(e.code==='permission-denied'){toast('Permissão negada. Atualize as regras do Firestore.','error');}else{toast('Erro ao salvar: '+e.message,'error');}}},800);};

function showSaved(){const el=document.getElementById('save-indicator');el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2000);}
function setLoadMsg(m){document.getElementById('loading-msg').textContent=m;}

// ── HELPERS ──────────────────────────────────────────────────────────────
const genId=()=>`${Date.now()}-${Math.floor(Math.random()*99999)}`;
const BRL=n=>`$ ${Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}`;const BRL_LABEL='USD ($)';
const fmtD=d=>d?new Date(d+'T00:00:00').toLocaleDateString('pt-BR'):'-';
const today=()=>new Date().toISOString().slice(0,10);
const BCATS=['Literatura','Clássicos','Ficção Científica','Romance','Autoajuda','Negócios','Infantil','Não-ficção','HQ','Outros'];
let charts={};
window.toast=function(msg,type='success'){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+type;clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',3200);};

// Currency format helpers
function parseCur(v){return parseFloat(String(v).replace(',','.'))||0;}
function initCurrency(selector=''){
  setTimeout(()=>{
    document.querySelectorAll(selector||'.cur').forEach(el=>{
      if(!el.dataset.curInit){
        el.dataset.curInit='1';
        el.addEventListener('focus',e=>{if(e.target.value==='0.00'||e.target.value==='')e.target.select();});
        el.addEventListener('blur',e=>{const v=parseCur(e.target.value);e.target.value=v.toFixed(2);updateCalc();});
        el.addEventListener('input',()=>updateCalc());
      }
    });
  },50);
}
function updateCalc(){
  // book form
  const cost=parseCur(document.getElementById('f-cost')?.value),sale=parseCur(document.getElementById('f-sale')?.value);
  const bc=document.getElementById('book-calc');
  if(bc&&(cost>0||sale>0)){const margin=sale>0?((sale-cost)/sale*100):0,markup=cost>0?((sale-cost)/cost*100):0;bc.textContent=`Margem: ${margin.toFixed(1)}%  |  Markup: ${markup.toFixed(1)}%  |  Lucro unit.: ${BRL(sale-cost)}`;bc.className=markup>0?'calc-box':'calc-box warn';}
  // kit form
  updateKitCalc();
}
function updateKitCalc(){
  const el=document.getElementById('kit-calc');if(!el)return;
  const cost=window._kitItems?window._kitItems.reduce((a,item)=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return a+(b?b.costPrice*item.quantity:0);},0):0;
  const sale=parseCur(document.getElementById('kf-price')?.value);
  const markup=cost>0&&sale>0?((sale-cost)/cost*100):0;
  el.textContent=`Custo dos livros: ${BRL(cost)}${sale>0?`  |  Markup: ${markup.toFixed(1)}%  |  Lucro: ${BRL(sale-cost)}`:''}`;
  el.className=markup>0?'calc-box':'calc-box warn';
}

function buildNav(){

  ).join('');

const fg=(l,i)=>`<div class="fg"><label>${l}</label>${i}</div>`;
const inp=(id,type='text',val='',ph='',cls='')=>`<input type="${type}" id="${id}" value="${String(val||'').replace(/"/g,'&quot;')}" placeholder="${ph}" class="${cls}" style="width:100%">`;
const cinp=(id,val='0.00',ph='0,00')=>`<div class="currency-wrap"><input type="number" step="0.01" id="${id}" value="${Number(val||0).toFixed(2)}" placeholder="${ph}" class="cur" style="width:100%"></div>`;
const sel=(id,opts,val='')=>`<select id="${id}" style="width:100%">${opts.map(o=>typeof o==='string'?`<option ${o===val?'selected':''}>${o}</option>`:`<option value="${o.v}" ${o.v===val?'selected':''}>${o.l}</option>`).join('')}</select>`;

function tbl(cols,rows,empty='Nenhum registro.'){
  return`<div style="overflow-x:auto"><table><thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead><tbody>${rows.length===0?`<tr class="empty-row"><td colspan="${cols.length}">${empty}</td></tr>`:rows.map(r=>`<tr>${cols.map(c=>`<td>${c.render?c.render(r):r[c.key]??'-'}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
function statCard(icon,lbl,value,color,sub=''){return`<div class="stat-card" style="border-left:4px solid ${color}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="stat-label">${lbl}</div><div class="stat-value">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div><div style="width:42px;height:42px;border-radius:10px;background:${color}18;display:flex;align-items:center;justify-content:center;font-size:20px">${icon}</div></div></div>`;}

// ── DASHBOARD ────────────────────────────────────────────────────────────
function renderDashboard(){
  const S=window.state,tot=S.books.reduce((a,b)=>a+b.stock,0),val=S.books.reduce((a,b)=>a+b.stock*b.salePrice,0);
  const now=new Date(),[mo,yr]=[now.getMonth(),now.getFullYear()];
  const mRev=S.movements.filter(m=>m.type==='saida'&&new Date(m.date).getMonth()===mo&&new Date(m.date).getFullYear()===yr).reduce((a,m)=>a+m.quantity*m.unitPrice,0);
  const mExp=S.expenses.filter(e=>new Date(e.date).getMonth()===mo&&new Date(e.date).getFullYear()===yr).reduce((a,e)=>a+parseCur(e.amount),0);
  const low=S.books.filter(b=>b.stock<=5);
  const recent=[...S.movements].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  const lbl=[],rv=[],ex=[];
  for(let i=5;i>=0;i--){const d=new Date(yr,mo-i,1);lbl.push(d.toLocaleDateString('pt-BR',{month:'short'}).replace('.',''));const m2=d.getMonth(),y2=d.getFullYear();rv.push(+S.movements.filter(mv=>mv.type==='saida'&&new Date(mv.date).getMonth()===m2&&new Date(mv.date).getFullYear()===y2).reduce((a,mv)=>a+mv.quantity*mv.unitPrice,0).toFixed(2));ex.push(+S.expenses.filter(e=>new Date(e.date).getMonth()===m2&&new Date(e.date).getFullYear()===y2).reduce((a,e)=>a+parseCur(e.amount),0).toFixed(2));}
  document.getElementById('content').innerHTML=`
    <div class="grid4" style="margin-bottom:16px">${statCard('📚','Livros em Estoque',tot,'#6366f1',BRL(val)+' em valor')}${statCard('👥','Clientes',S.clients.length,'#3b82f6','')}${statCard('📈','Receita do Mês',BRL(mRev),'#10b981','')}${statCard('💸','Despesas do Mês',BRL(mExp),'#f59e0b','#f59e0b','')}</div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">📊 Receita vs Despesas — 6 meses</div><div class="chart-wrap"><canvas id="dash-chart"></canvas></div></div>
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:12px">⚠️ Estoque Crítico</div>${low.length===0?'<div style="color:var(--muted);font-size:13px;padding:16px 0;text-align:center">✅ Todos os livros OK!</div>':low.map(b=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><div style="font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.title}</div><span class="badge badge-red" style="margin-left:8px">${b.stock}</span></div>`).join('')}</div>
    </div>
    <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:13px;font-weight:600">🔄 Últimas Movimentações</span><button class="btn btn-sm" onclick="goto('movimentos')">Ver todas</button></div>
      ${tbl([{label:'Data',render:r=>fmtD(r.date)},{label:'Tipo',render:r=>`<span class="badge ${r.type==='entrada'?'badge-green':r.type==='brinde'?'badge-purple':'badge-red'}">${r.type==='entrada'?'↑ Entrada':r.type==='brinde'?'🎁 Brinde':'↓ Saída'}</span>`},{label:'Livro',render:r=>r.bookTitle||'-'},{label:'Qtd',key:'quantity'},{label:'Total',render:r=>`<strong>${BRL(r.quantity*r.unitPrice)}</strong>`},{label:'Contato',render:r=>r.supplierName||r.clientName||'-'}],recent,'Nenhuma movimentação ainda.')}
    </div>`;
  setTimeout(()=>{const el=document.getElementById('dash-chart');if(!el)return;charts['dash']=new Chart(el,{type:'bar',data:{labels:lbl,datasets:[{label:'Receita',data:rv,backgroundColor:'#10b981',borderRadius:4,barThickness:14},{label:'Despesas',data:ex,backgroundColor:'#f59e0b',borderRadius:4,barThickness:14}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Sora'},boxWidth:12}}},scales:{x:{grid:{display:false},ticks:{font:{family:'Sora',size:11}}},y:{grid:{color:'#f1f5f9'},ticks:{font:{family:'Sora',size:11},callback:v=>'R$'+v}}}}});},50);
}

}
window.openBookModal=function(book=null){
  openModal(book?'Editar Livro':'Novo Livro',`
    ${fg('Título *',inp('f-title','text',book?.title||''))}
    ${fg('Autor *',inp('f-author','text',book?.author||''))}
    <div class="grid2">${fg('ISBN',inp('f-isbn','text',book?.isbn||''))}${fg('Categoria',sel('f-cat',BCATS,book?.category||'Literatura'))}</div>
    <div class="grid2">
      ${fg('Preço de Custo (R$)',cinp('f-cost',book?.costPrice||0))}
      ${fg('Preço de Venda (R$)',cinp('f-sale',book?.salePrice||0))}
    </div>
    <div class="grid2">
      ${fg('Frete EUA ($/un)',cinp('f-freight-usa',book?.freightUSA??5.50))}
      ${fg('Peso (kg/un)',inp('f-weight','number',book?.weight??0,'0'))}
    </div>
    <div style="font-size:11px;color:var(--sub);margin-top:-8px;margin-bottom:4px">Frete dentro dos EUA (padrão $5,50)</div>

  updateCalc();
};
window.saveBook=function(id){const d={title:document.getElementById('f-title').value.trim(),author:document.getElementById('f-author').value.trim(),isbn:document.getElementById('f-isbn').value.trim(),category:document.getElementById('f-cat').value,costPrice:parseCur(document.getElementById('f-cost').value),salePrice:parseCur(document.getElementById('f-sale').value),freightUSA:parseCur(document.getElementById('f-freight-usa').value)||5.50,weight:parseFloat(document.getElementById('f-weight').value)||0,stock:parseInt(document.getElementById('f-stock').value)||0};if(!d.title||!d.author)return alert('Título e autor são obrigatórios.');if(id)window.state.books=window.state.books.map(b=>b.id===id?{...b,...d}:b);else window.state.books.push({...d,id:genId()});saveState('books');closeModal();renderLivros();toast(id?'Livro atualizado!':'Livro cadastrado!');};
window.delBook=function(id){if(!confirm('Excluir este livro?'))return;window.state.books=window.state.books.filter(b=>b.id!==id);saveState('books');renderLivros();toast('Livro removido.','error');};

let movFilter='all',movType='saida';
window.setMovFilter=function(f){movFilter=f;renderMovimentos();};
window.setDespFilter=function(f){despFilter=f;renderDespesas();};
window.renderMovimentos=function(){
  var S=window.state;
  var sorted=S.movements.filter(function(m){return movFilter==='all'||m.type===movFilter;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  var filterBtns='';
  var _fAll=['all','Todos'];var _fItems=[['all','Todos'],['entrada','Entradas'],['saida','Saidas'],['brinde','Brindes'],['perda','Perdas']];
  _fItems.forEach(function(f){filterBtns+='<button class="filter-tab '+(movFilter===f[0]?'active':'')+'" data-fv="'+f[0]+'" onclick="setMovFilter(this.dataset.fv)">'+f[1]+'</button>';});
  var html='<div class="card" style="margin-bottom:12px;padding:11px 18px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center">'
    +'<div><div style="font-size:13px;font-weight:700">Importar pedidos do Shopify</div>'
    +'<div style="font-size:11px;color:var(--sub)">Shopify Admin - Orders - Export - CSV</div></div>'
    +'<label style="cursor:pointer"><div class="btn" style="background:#96bf48;font-size:12px">Importar CSV</div>'
    +'<input type="file" accept=".csv" onchange="importShopifyCSV(this)" style="display:none"></label></div></div>'
    +'<div class="action-btns">'
    +'<div class="action-btn ab-saida" onclick="openMovModal(this.dataset.t)" data-t="saida">'
    +'<span class="ab-icon">📤</span><span class="ab-label">Saida / Venda</span><span class="ab-sub">Registrar venda</span></div>'
    +'<div class="action-btn ab-entrada" onclick="openMovModal(this.dataset.t)" data-t="entrada">'
    +'<span class="ab-icon">📥</span><span class="ab-label">Entrada / Compra</span><span class="ab-sub">Receber estoque</span></div>'
    +'<div class="action-btn ab-brinde" onclick="openMovModal(this.dataset.t)" data-t="brinde">'
    +'<span class="ab-icon">🎁</span><span class="ab-label">Brinde / UGC</span><span class="ab-sub">Envio para criador</span></div>'
    +'<div class="action-btn ab-perda" onclick="openMovModal(this.dataset.t)" data-t="perda">'
    +'<span class="ab-icon">📉</span><span class="ab-label">Perda / Avaria</span><span class="ab-sub">Produto danificado</span></div>'
    +'</div>'
    +'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">'
    +'<span style="font-size:14px;font-weight:700">Historico ('+sorted.length+')</span>'
    +'<div class="filter-tabs">'+filterBtns+'</div></div>'
    +tbl([
      {label:'Data',render:function(r){return fmtD(r.date);}},
      {label:'Tipo',render:function(r){var t={entrada:'badge-green',brinde:'badge-purple',perda:'badge-amber',saida:'badge-red'};var l={entrada:'Entrada',brinde:'Brinde',perda:'Perda',saida:'Saida'};return '<span class="badge '+(t[r.type]||'badge-red')+'">'+(l[r.type]||r.type)+'</span>';}},
      {label:'Produto',render:function(r){return '<div style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(r.bookTitle||'-')+'</div>';}},
      {label:'Qtd',key:'quantity'},
      {label:'Unit.',render:function(r){return r.unitPrice>0?BRL(r.unitPrice):'-';}},
      {label:'Total',render:function(r){return '<strong>'+BRL(r.quantity*(r.unitPrice||0))+'</strong>';}},
      {label:'Contato',render:function(r){return r.clientName||r.supplierName||'-';}},
      {label:'UGC',render:function(r){return r.ugcCode?'<span class="badge badge-indigo" style="font-size:10px">'+r.ugcCode+'</span>':'';}},
      {label:'',render:function(r){return '<div style="display:flex;gap:4px"><button class="btn btn-sm" onclick="openEditMov(this.dataset.id)" data-id="'+r.id+'">✏️</button><button class="btn btn-sm btn-red" onclick="delMov(this.dataset.id)" data-id="'+r.id+'">🗑️</button></div>';}}
    ],sorted,'Nenhuma movimentacao registrada.')

window.setMovType=function(t){
  movType=t;document.getElementById('mov-type').value=t;
  const s=document.getElementById('tb-saida'),e=document.getElementById('tb-entrada');
  const cw=document.getElementById('mov-client-wrap'),sw=document.getElementById('mov-supplier-wrap');
  if(t==='saida'){s.style.cssText='border:2px solid #ef4444;background:#fee2e2;color:#dc2626';e.style.cssText='border:2px solid var(--border);background:#fff;color:var(--sub)';cw.style.display='';sw.style.display='none';}
  else{e.style.cssText='border:2px solid #10b981;background:#dcfce7;color:#166534';s.style.cssText='border:2px solid var(--border);background:#fff;color:var(--sub)';cw.style.display='none';sw.style.display='';}
};
window.autoMovPrice=function(){const b=window.state.books.find(b=>b.id===document.getElementById('mov-book').value);if(b){const t=document.getElementById('mov-type').value;document.getElementById('mov-price').value=(t==='saida'?b.salePrice:b.costPrice).toFixed(2);}updMovTotal();};
function updMovTotal(){const q=parseCur(document.getElementById('mov-qty')?.value),p=parseCur(document.getElementById('mov-price')?.value),f=parseCur(document.getElementById('mov-frete')?.value),el=document.getElementById('mov-total');if(el&&q>0&&p>0){el.style.display='block';el.textContent=`💰 Subtotal: ${BRL(q*p)}${f>0?`  +  Frete: ${BRL(f)}  =  ${BRL(q*p+f)}`:''}`;}}
window.saveMov=function(){
  const type=document.getElementById('mov-type').value,bookId=document.getElementById('mov-book').value;
  const qty=parseInt(document.getElementById('mov-qty').value)||0,price=parseCur(document.getElementById('mov-price').value);
  if(!bookId||!qty||!price)return alert('Preencha livro, quantidade e preço.');
  const book=window.state.books.find(b=>b.id===bookId);
  if((type==='saida'||type==='brinde')&&book.stock<qty)return alert(`Estoque insuficiente! Disponível: ${book.stock}`);
  const freightImport=parseCur(document.getElementById('mov-frete-import')?.value)||0;const freightBR=parseCur(document.getElementById('mov-frete-br')?.value)||0;const freightCost=freightImport+freightBR;
  const supplierId=document.getElementById('mov-supplier')?.value||'';
  const supplier=supplierId?window.state.suppliers.find(s=>s.id===supplierId):null;
  const clientId=document.getElementById('mov-client')?.value||'';
  const client=clientId?window.state.clients.find(c=>c.id===clientId):null;
  const ugcCode=document.getElementById('mov-ugc')?.value||'';
  const discPct=parseFloat(document.getElementById('mov-disc')?.value)||0;
  const shopifyFee=parseCur(document.getElementById('mov-shopify')?.value)||0;
  const netPrice=discPct>0?price*(1-discPct/100):price;
  window.state.movements.push({id:genId(),type,bookId,bookTitle:book.title,quantity:qty,unitPrice:netPrice,grossUnitPrice:price,freightCost,freightImport,freightBR,supplierId,supplierName:supplier?.name||'',clientId,clientName:client?.name||'',ugcCode,discountPct:discPct,shopifyFee,date:document.getElementById('mov-date').value,notes:document.getElementById('mov-notes').value});
  window.state.books=window.state.books.map(b=>b.id===bookId?{...b,stock:b.stock+(type==='entrada'?qty:-qty)}:b); // brinde also deducts
  saveState('movements');saveState('books');toast(type==='entrada'?'Entrada registrada!':'Saída registrada!');renderMovimentos();
};

// ── KITS ─────────────────────────────────────────────────────────────────
window._kitItems=[];
let _kitSearch='', _kitFilter='todos', _kitView='table';
window.setKitSearch=function(v){_kitSearch=v;renderKits();};
window.setKitView=function(v){_kitView=v;renderKits()};
window.setKitFilter=function(f){
  _kitFilter=f;
  document.querySelectorAll('#kit-filter-tabs .filter-tab').forEach((btn,i)=>{
    const filters=['todos','mais_vendidos','mais_lucro','menos_vendidos','estoque','sem_estoque'];
    btn.classList.toggle('active',filters[i]===f);
  });
  renderKits();
};
window.renderKits=function(){
  const kCost=kit=>{
    const bom=kit.items.reduce((a,i)=>{const b=window.state.books.find(bk=>bk.id===i.bookId);return a+(b?((b.costPrice||0)+(b.freightUSA??5.50))*i.quantity:0);},0);
    return (bom>0?bom:(parseCur(kit.costPrice)||0))+(parseCur(kit.packagingCost)||0);
  };
  let filteredKits=[...window.state.kits];
  const kSalesCount=kit=>window.state.movements.filter(m=>m.type==='saida'&&m.bookId===`kit-${kit.id}`).reduce((a,m)=>a+m.quantity,0);
  const kProfit=kit=>{const cost=kCost(kit);return(parseCur(kit.salePrice)-cost)*kSalesCount(kit);};
  if(_kitSearch){const q=_kitSearch.toLowerCase();filteredKits=filteredKits.filter(k=>k.name.toLowerCase().includes(q));}
  if(_kitFilter==='mais_vendidos')filteredKits.sort((a,b)=>kSalesCount(b)-kSalesCount(a));
  else if(_kitFilter==='mais_lucro')filteredKits.sort((a,b)=>kProfit(b)-kProfit(a));
  else if(_kitFilter==='menos_vendidos')filteredKits.sort((a,b)=>kSalesCount(a)-kSalesCount(b));
  else if(_kitFilter==='estoque')filteredKits=filteredKits.filter(k=>(k.stock||0)>0);
  else if(_kitFilter==='sem_estoque')filteredKits=filteredKits.filter(k=>!(k.stock||0));
  const kitsToShow=filteredKits;
  const tableView=`<div class="card" style="padding:0;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead><tr style="background:#f8fafc;border-bottom:2px solid var(--border)">
      <th style="padding:10px 14px;text-align:left;font-weight:600">Kit</th>
      <th style="padding:10px 14px;text-align:right;font-weight:600">Venda</th>
      <th style="padding:10px 14px;text-align:right;font-weight:600">Custo</th>
      <th style="padding:10px 14px;text-align:right;font-weight:600">Markup</th>
      <th style="padding:10px 14px;text-align:center;font-weight:600">Estoque</th>
      <th style="padding:10px 14px;text-align:center;font-weight:600">Vendidos</th>
      <th style="padding:10px 14px;text-align:right;font-weight:600">Ações</th>
    </tr></thead>
    <tbody>${kitsToShow.map(kit=>{
      const cost=kCost(kit),margin=parseCur(kit.salePrice)>0?((parseCur(kit.salePrice)-cost)/cost*100):0,sold=kSalesCount(kit);
      return`<tr style="border-bottom:1px solid #f1f5f9">
        <td style="padding:10px 14px"><div style="font-weight:600">🎁 ${kit.name}</div>${kit.description?`<div style="font-size:11px;color:var(--sub)">${kit.description}</div>`:''}</td>
        <td style="padding:10px 14px;text-align:right;font-weight:600">${BRL(kit.salePrice)}</td>
        <td style="padding:10px 14px;text-align:right;color:var(--sub)">${BRL(cost)}</td>
        <td style="padding:10px 14px;text-align:right"><span style="color:${margin>30?'#10b981':margin>10?'#f59e0b':'#ef4444'};font-weight:600">${margin.toFixed(0)}%</span></td>
        <td style="padding:10px 14px;text-align:center"><span class="badge ${(kit.stock||0)>0?'badge-green':'badge-red'}">${kit.stock||0}</span></td>
        <td style="padding:10px 14px;text-align:center"><span class="badge badge-indigo">${sold}</span></td>
        <td style="padding:10px 14px;text-align:right"><div style="display:flex;gap:4px;justify-content:flex-end">
          <button class="btn btn-sm btn-green" onclick="sellKit('${kit.id}')" ${!kit.stock?'disabled':''}>💲</button>
          <button class="btn btn-sm btn-amber" onclick="buildMoreKit('${kit.id}')">+</button>
          <button class="btn btn-sm" onclick='openKitModal(${JSON.stringify(kit).replace(/'/g,"&#39;")})'>✏️</button>
          <button class="btn btn-sm btn-red" onclick="delKit('${kit.id}')">🗑️</button>
        </div></td>
      </tr>`;}).join('')}
    </tbody></table></div>`;
  const cardView=`<div class="kit-grid">${kitsToShow.map(kit=>{
    const cost=kCost(kit),margin=parseCur(kit.salePrice)>0?((parseCur(kit.salePrice)-cost)/cost*100):0;
    return`<div class="kit-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div style="font-size:15px;font-weight:700">🎁 ${kit.name}</div><span class="badge badge-green">${BRL(kit.salePrice)}</span></div>
      ${kit.description?`<div style="font-size:12px;color:var(--sub);margin-bottom:8px">${kit.description}</div>`:''}
      <div style="font-size:12px;color:var(--sub);margin-bottom:4px">Conteúdo:</div>
      ${kit.items.map(item=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return b?`<div style="font-size:12px;padding:2px 0;color:#374151">• ${b.title} × ${item.quantity}</div>`:''}).join('')}
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
        <div style="font-size:11px;color:var(--sub)">Custo<br><strong>${BRL(cost)}</strong></div>
        <div style="font-size:11px;color:var(--sub)">Markup<br><strong style="color:${margin>30?'#10b981':margin>10?'#f59e0b':'#ef4444'}">${margin.toFixed(1)}%</strong></div>
        <div style="font-size:11px;color:var(--sub)">Estoque<br><span class="badge ${(kit.stock||0)>0?'badge-green':'badge-red'}">${kit.stock||0}</span></div>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px">
        <button class="btn btn-sm btn-green" style="flex:1" onclick="sellKit('${kit.id}')" ${!kit.stock?'disabled':''}>Vender${kit.stock>0?` (${kit.stock})`:'—'}</button>
        <button class="btn btn-sm btn-amber" onclick="buildMoreKit('${kit.id}')">+ Montar</button>
        <button class="btn btn-sm" onclick='openKitModal(${JSON.stringify(kit).replace(/'/g,"&#39;")})'>✏️</button>
        <button class="btn btn-sm btn-red" onclick="delKit('${kit.id}')">🗑️</button>
      </div>
    </div>`;}).join('')}</div>`;
  document.getElementById('content').innerHTML=`
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <input class="search-input" id="kit-search" placeholder="🔍 Buscar kit..." oninput="setKitSearch(this.value)" style="max-width:240px">
      <div class="filter-tabs" id="kit-filter-tabs">
        <button class="filter-tab ${_kitFilter==='todos'?'active':''}" onclick="setKitFilter('todos')">Todos</button>
        <button class="filter-tab ${_kitFilter==='mais_vendidos'?'active':''}" onclick="setKitFilter('mais_vendidos')">+ Vendidos</button>
        <button class="filter-tab ${_kitFilter==='mais_lucro'?'active':''}" onclick="setKitFilter('mais_lucro')">+ Rentáveis</button>
        <button class="filter-tab ${_kitFilter==='menos_vendidos'?'active':''}" onclick="setKitFilter('menos_vendidos')">− Vendidos</button>
        <button class="filter-tab ${_kitFilter==='estoque'?'active':''}" onclick="setKitFilter('estoque')">Com Estoque</button>
        <button class="filter-tab ${_kitFilter==='sem_estoque'?'active':''}" onclick="setKitFilter('sem_estoque')">Sem Estoque</button>
      </div>
      <div style="display:flex;gap:4px;margin-left:auto">
        <button class="btn btn-sm ${_kitView==='table'?'':'btn-gray'}" onclick="setKitView('table')" title="Lista">☰ Lista</button>
        <button class="btn btn-sm ${_kitView==='card'?'':'btn-gray'}" onclick="setKitView('card')" title="Cards">⊞ Cards</button>
      </div>
      <button class="btn" onclick="openKitModal()">+ Montar Kit</button>
    </div>
    ${kitsToShow.length===0
      ?`<div class="card" style="text-align:center;padding:52px"><div style="font-size:44px;margin-bottom:10px">🎁</div><div style="font-size:15px;font-weight:600">Nenhum kit montado</div><div style="font-size:13px;color:var(--sub);margin-top:6px">Ao montar um kit, o estoque dos livros é descontado.</div></div>`
      :_kitView==='table'?tableView:cardView}`;
};

window.openKitModal=function(kit=null){
  window._kitItems=kit?[...kit.items]:[];
  openModal(kit?'Editar Kit':'Montar Kit',`
    ${fg('Nome do Kit *',inp('kf-name','text',kit?.name||''))}
    ${fg('Descrição',inp('kf-desc','text',kit?.description||'','Descrição do kit'))}
    ${fg('Preço de Venda (R$) *',cinp('kf-price',kit?.salePrice||0))}
    ${fg('Custo de Embalagem ($)',cinp('kf-packaging',kit?.packagingCost||0))}
    <div style="font-size:11px;color:var(--sub);margin-top:-8px;margin-bottom:4px">Caixa, fita, proteção, etc. por kit</div>
    <div class="calc-box warn" id="kit-calc">Adicione livros para calcular o custo.</div>
    <div style="font-size:13px;font-weight:600;margin:4px 0 8px">📚 Livros do Kit</div>
    <div style="display:flex;gap:8px;margin-bottom:10px"><select id="kf-book" onchange="updateKitCalc()" style="flex:2;padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Sora',sans-serif;outline:none"><option value="">Selecione um livro...</option>${window.state.books.map(b=>`<option value="${b.id}">${b.title} (est: ${b.stock})</option>`).join('')}</select><input type="number" id="kf-qty" value="1" min="1" style="width:64px;padding:9px 8px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Sora',sans-serif;outline:none;text-align:center"><button class="btn btn-sm btn-green" onclick="addKitItem()">+ Add</button></div>
    <div id="kit-items-list"></div>
    ${!kit?`<div style="margin-top:10px">${fg('Quantidade de kits a montar *',inp('kf-qty-build','number','1','1'))}<div class="alert alert-amber" style="font-size:12px;margin-top:-6px">⚠️ Ao salvar, o estoque dos livros será descontado.</div></div>`:''}
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button class="btn btn-gray" onclick="closeModal()">Cancelar</button><button class="btn" onclick="saveKit('${kit?.id||''}')">Salvar Kit</button></div>`,false);
  renderKitItemsList();updateKitCalc();
};

function renderKitItemsList(){const el=document.getElementById('kit-items-list');if(!el)return;const items=window._kitItems;el.innerHTML=items.length===0?'<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Nenhum livro adicionado.</div>':items.map((item,i)=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:#f8fafc;border-radius:7px;margin-bottom:4px"><span style="font-size:12px">${b?.title||'?'} × ${item.quantity} <span style="color:var(--sub)">(custo: ${BRL((b?.costPrice||0)*item.quantity)})</span></span><button class="btn btn-sm btn-red" onclick="removeKitItem(${i})">✕</button></div>`;}).join('');}
window.addKitItem=function(){const bookId=document.getElementById('kf-book').value,qty=parseInt(document.getElementById('kf-qty').value)||1;if(!bookId)return;const ex=window._kitItems.findIndex(i=>i.bookId===bookId);if(ex>=0)window._kitItems[ex].quantity+=qty;else window._kitItems.push({bookId,quantity:qty});renderKitItemsList();updateKitCalc();};
window.removeKitItem=function(i){window._kitItems.splice(i,1);renderKitItemsList();updateKitCalc();};
window.saveKit=function(id){
  const d={name:document.getElementById('kf-name').value.trim(),description:document.getElementById('kf-desc').value,salePrice:parseCur(document.getElementById('kf-price').value),packagingCost:parseCur(document.getElementById('kf-packaging').value)||0,items:[...window._kitItems]};
  if(!d.name||!d.salePrice)return alert('Preencha nome e preço.');if(d.items.length===0)return alert('Adicione pelo menos um livro.');
  if(id){window.state.kits=window.state.kits.map(k=>k.id===id?{...k,...d}:k);}
  else{
    const buildQty=parseInt(document.getElementById('kf-qty-build')?.value)||1;
    // Check stock availability

function renderDespesas(){

  for(var mi=0;mi<13;mi++){

    var lbl=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  }
  var byMonth=despMonth==='all'?S.expenses:S.expenses.filter(function(e){return e.date&&e.date.slice(0,7)===despMonth;});

  var filtered=byMonth.filter(function(e){return despFilter==='all'||e.category===despFilter;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  var totalGeral=byMonth.reduce(function(a,e){return a+parseCur(e.amount);},0);
  var totByCat=cats.map(function(cat){return{cat:cat,val:byMonth.filter(function(e){return e.category===cat;}).reduce(function(a,e){return a+parseCur(e.amount);},0)};}).filter(function(x){return x.val>0;}).sort(function(a,b){return b.val-a.val;});
  var partners=S.partners||[];
  var p1=byMonth.filter(function(e){return e.paidBy==='p1';}).reduce(function(a,e){return a+parseCur(e.amount);},0);
  var p2=byMonth.filter(function(e){return e.paidBy==='p2';}).reduce(function(a,e){return a+parseCur(e.amount);},0);
  var catCards='';

    +statCard('💸','Total Periodo',BRL(totalGeral),'#ef4444','')+catCards+p1Card+p2Card+'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center">'

function renderRelatorios(){
  const S=window.state;
  const tRev=S.movements.filter(m=>m.type==='saida').reduce((a,m)=>a+m.quantity*m.unitPrice,0);
  const tCost=S.movements.filter(m=>m.type==='entrada').reduce((a,m)=>a+m.quantity*m.unitPrice,0);
  const tExp=S.expenses.reduce((a,e)=>a+parseCur(e.amount),0);
  const profit=tRev-tCost-tExp;
  const now=new Date(),lbl=[],rv=[],ex=[],lu=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);lbl.push(d.toLocaleDateString('pt-BR',{month:'short'}).replace('.',''));const mo=d.getMonth(),yr=d.getFullYear(),r=S.movements.filter(mv=>mv.type==='saida'&&new Date(mv.date).getMonth()===mo&&new Date(mv.date).getFullYear()===yr).reduce((a,mv)=>a+mv.quantity*mv.unitPrice,0),e=S.expenses.filter(ex=>new Date(ex.date).getMonth()===mo&&new Date(ex.date).getFullYear()===yr).reduce((a,ex)=>a+parseCur(ex.amount),0);rv.push(+r.toFixed(2));ex.push(+e.toFixed(2));lu.push(+(r-e).toFixed(2));}
  // Top sold + most profitable
  const allItems=[...S.kits.map(k=>({id:`kit-${k.id}`,title:k.name,salePrice:k.salePrice,costPrice:k.costPrice,category:'Kits',isKit:true})),...S.books.map(b=>({...b,isKit:false}))];

    const soldCogs=S.movements.filter(m=>m.type==='saida'&&m.bookId===b.id).reduce((a,m)=>a+(m.cogs||b.costPrice*m.quantity),0);
    const costOfSold=soldCogs||sold*b.costPrice;
    const profit=revenue-costOfSold;
    return{...b,sold,revenue,profit,markup:b.costPrice>0?((b.salePrice-b.costPrice)/b.costPrice*100):0};
  }).filter(b=>b.sold>0);
  const topSold=[...bookStats].sort((a,b)=>b.sold-a.sold).slice(0,6);
  const topProfit=[...bookStats].sort((a,b)=>b.profit-a.profit).slice(0,6);
  const kitRev=S.movements.filter(m=>m.type==='saida'&&m.bookId?.startsWith('kit-')).reduce((a,m)=>a+m.quantity*m.unitPrice,0);const catRev=[...(kitRev>0?[{name:'Kits',value:+kitRev.toFixed(2)}]:[]),...BCATS.map(cat=>{const v=S.movements.filter(m=>m.type==='saida'&&!m.bookId?.startsWith('kit-')).reduce((a,m)=>{const b=S.books.find(bk=>bk.id===m.bookId);return b?.category===cat?a+m.quantity*m.unitPrice:a;},0);return{name:cat,value:+v.toFixed(2)};})].filter(c=>c.value>0).sort((a,b)=>b.value-a.value).slice(0,6);
  const catExp=window.state.expenseCategories.map(cat=>({name:cat,value:+S.expenses.filter(e=>e.category===cat).reduce((a,e)=>a+parseCur(e.amount),0).toFixed(2)})).filter(c=>c.value>0);
  document.getElementById('content').innerHTML=`
    <div class="grid4" style="margin-bottom:14px">${statCard('📈','Receita Total',BRL(tRev),'#10b981','')}${statCard('📉','Custo Compras',BRL(tCost),'#ef4444','')}${statCard('💸','Despesas',BRL(tExp),'#f59e0b','')}${statCard('💰','Lucro Líquido',BRL(profit),profit>=0?'#10b981':'#ef4444','')}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">📊 Tendência Mensal</div><div class="chart-wrap"><canvas id="rpt-line"></canvas></div></div>
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">🥧 Despesas por Categoria</div>${catExp.length===0?'<div style="text-align:center;color:var(--muted);padding:40px">Sem despesas.</div>':`<div class="chart-wrap"><canvas id="rpt-pie"></canvas></div>`}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">🏆 Mais Vendidos</div>${tbl([{label:'Livro',render:r=>`<div style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${r.title}</div>`},{label:'Unid.',render:r=>`<span class="badge badge-indigo">${r.sold}</span>`},{label:'Receita',render:r=>`<strong style="color:#10b981">${BRL(r.revenue)}</strong>`}],topSold,'Nenhuma venda.')}</div>
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">💰 Mais Rentáveis</div>${tbl([{label:'Livro',render:r=>`<div style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${r.title}</div>`},{label:'Markup',render:r=>`<span class="badge ${r.markup>30?'badge-green':r.markup>10?'badge-amber':'badge-red'}">${r.markup.toFixed(1)}%</span>`},{label:'Lucro',render:r=>`<strong style="color:#10b981">${BRL(r.profit)}</strong>`}],topProfit,'Nenhuma venda.')}</div>
    </div>
    <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">📂 Receita por Categoria</div>${catRev.length===0?'<div style="text-align:center;color:var(--muted);padding:24px">Sem dados.</div>':`<div class="chart-wrap"><canvas id="rpt-bar"></canvas></div>`}</div>`;
  setTimeout(()=>{
    const lc=document.getElementById('rpt-line');if(lc)charts['line']=new Chart(lc,{type:'line',data:{labels:lbl,datasets:[{label:'Receita',data:rv,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)',tension:.3,fill:true,pointRadius:4},{label:'Despesas',data:ex,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.05)',tension:.3,fill:true,pointRadius:4},{label:'Lucro',data:lu,borderColor:'#6366f1',tension:.3,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Sora'},boxWidth:12}}},scales:{x:{grid:{display:false},ticks:{font:{family:'Sora',size:11}}},y:{ticks:{font:{family:'Sora',size:11},callback:v=>'R$'+v}}}}});
    const pc=document.getElementById('rpt-pie');if(pc&&catExp.length)charts['pie']=new Chart(pc,{type:'doughnut',data:{labels:catExp.map(c=>c.name),datasets:[{data:catExp.map(c=>c.value),backgroundColor:['#6366f1','#f59e0b','#10b981','#ef4444','#3b82f6','#8b5cf6'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Sora'},boxWidth:12}}}}});
    const bc=document.getElementById('rpt-bar');if(bc&&catRev.length)charts['bar']=new Chart(bc,{type:'bar',data:{labels:catRev.map(c=>c.name),datasets:[{data:catRev.map(c=>c.value),backgroundColor:'#6366f1',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{family:'Sora',size:11},callback:v=>'R$'+v}},y:{grid:{display:false},ticks:{font:{family:'Sora',size:11}}}}}});

window.addCategory=function(){const v=document.getElementById('new-cat-inp')?.value?.trim();if(!v||window.state.expenseCategories.includes(v))return;window.state.expenseCategories.push(v);saveState('expenseCategories');renderConfig();toast('Categoria adicionada!');};
window.removeCategory=function(i){if(!confirm('Remover categoria?'))return;window.state.expenseCategories.splice(i,1);saveState('expenseCategories');renderConfig();};
window.downloadBackup=function(){const data=JSON.stringify(window.state,null,2);const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`tucanobook-backup-${today()}-${new Date().toTimeString().slice(0,8).replace(/:/g,'h')}.json`;a.click();URL.revokeObjectURL(url);toast('Backup baixado!');};
window.restoreBackup=async function(input){
  const file=input.files[0];if(!file)return;
  const el=document.getElementById('restore-status');
  if(!confirm('⚠️ Isso substituirá TODOS os dados atuais. Confirma?')){input.value='';return;}
  try{
    el.textContent='Lendo arquivo...';
    const text=await file.text();const data=JSON.parse(text);
    const keys=['books','clients','suppliers','movements','kits','expenses','expenseCategories'];
    for(const key of keys){if(data[key]!==undefined){window.state[key]=data[key];await setDoc(doc(db,COLL,key),{items:data[key]});}}
    el.textContent='✅ Restaurado com sucesso!';el.style.color='#10b981';
    toast('Backup restaurado!');setTimeout(()=>renderConfig(),1000);
  }catch(e){el.textContent='❌ Erro: '+e.message;el.style.color='#ef4444';}
};
