<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="Sistema de gestão de livraria">
<title>LivroGest</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:#f0f4f8;color:#1a2332;height:100vh;overflow:hidden}
:root{
  --navy:#0f172a;--navy2:#1e293b;--indigo:#6366f1;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
  --bg:#f0f4f8;--card:#fff;--border:#e2e8f0;
  --text:#0f172a;--sub:#64748b;--muted:#94a3b8
}
.app{display:flex;height:100vh;overflow:hidden}
/* Sidebar */
.sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo h1{color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.sb-logo small{color:#475569;font-size:11px;margin-top:2px;display:block}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-section{padding:14px 16px 3px;color:#475569;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:#94a3b8;font-size:13px;font-weight:400;border-left:3px solid transparent;transition:all .12s}
.nav-item:hover{color:#cbd5e1;background:rgba(255,255,255,.04)}
.nav-item.active{color:#fff;font-weight:600;background:rgba(99,102,241,.18);border-left-color:#6366f1}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);color:#475569;font-size:10px}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;padding:12px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.topbar h2{font-size:17px;font-weight:700;color:var(--text)}
.topbar p{font-size:12px;color:var(--sub);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:18px}
/* Cards */
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid var(--border)}
.stat-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid var(--border)}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.stat-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:24px;font-weight:700;color:var(--text);margin-top:5px}
.stat-sub{font-size:12px;color:var(--sub);margin-top:3px}
/* Table */
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;background:#f8fafc;border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;color:#374151;border-bottom:1px solid #f1f5f9}
tr:hover td{background:#fafbff}
.empty-row td{text-align:center;color:var(--muted);padding:32px 14px}
/* Buttons */
.btn{background:var(--indigo);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:'Sora',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.btn-gray{background:#e2e8f0;color:#475569}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
/* Form */
.fg{margin-bottom:13px}
.fg label{font-size:12px;font-weight:600;color:#374151;display:block;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;color:var(--text);font-family:'Sora',sans-serif;background:#fff;transition:border-color .15s;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--indigo)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-indigo{background:#eef2ff;color:#4338ca}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-gray{background:#f1f5f9;color:#475569}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:660px}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-head h3{font-size:17px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--sub)}
/* Toggle */
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-btn{padding:9px 0;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;font-family:'Sora',sans-serif;transition:all .15s}
/* Filters */
.filter-tabs{display:flex;gap:6px}
.filter-tab{background:#e2e8f0;color:#475569;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif}
.filter-tab.active{background:var(--indigo);color:#fff}
/* Alerts */
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
.alert-green{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.alert-red{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}
.alert-amber{background:#fffbeb;border:1px solid #fcd34d;color:#92400e}
/* Search */
.search-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.search-input{flex:1;min-width:220px;max-width:320px;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Sora',sans-serif;outline:none}
.search-input:focus{border-color:var(--indigo)}
.chart-wrap{position:relative;height:200px}
.kit-card{background:#fff;border-radius:12px;padding:18px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.07)}
.kit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
/* Loading screen */
#loading-screen{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
#loading-screen h2{color:#fff;font-size:22px;font-weight:700}
#loading-screen p{color:#64748b;font-size:13px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#065f46;border-left:4px solid #10b981}
.toast.error{background:#7f1d1d;border-left:4px solid #ef4444}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div style="font-size:44px">📖</div>
  <h2>LivroGest</h2>
  <div class="spinner"></div>
  <p id="loading-msg">Conectando ao Firebase...</p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- App -->
<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sb-logo">
      <h1>📖 LivroGest</h1>
      <small>Gestão de livraria</small>
    </div>
    <nav class="sb-nav" id="nav"></nav>
    <div class="sb-footer">v1.0 • Firebase</div>
  </div>
  <div class="main">
    <div class="topbar">
      <div>
        <h2 id="page-title">Dashboard</h2>
        <p id="page-sub">Visão geral do negócio</p>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:12px;color:var(--sub)" id="top-date"></div>
        <div id="save-indicator" style="font-size:11px;color:#10b981;display:none">✓ Salvo</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal-box">
    <div class="modal-head">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script type="module">
import { initializeApp }          from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc,
         getDoc, setDoc,
         enableIndexedDbPersistence } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

// ─── Firebase init ─────────────────────────────────────────────────────────
let db;

async function initFirebase() {
  setLoadMsg('Carregando configuração...');
  let config;
  try {
    const res = await fetch('/api/config');
    if (!res.ok) throw new Error(await res.text());
    config = await res.json();
    if (config.error) throw new Error(config.error);
  } catch (e) {
    setLoadMsg('❌ Erro: ' + e.message);
    document.querySelector('.spinner').style.display = 'none';
    throw e;
  }

  setLoadMsg('Inicializando banco de dados...');
  const app = initializeApp(config);
  db = getFirestore(app);

  try {
    await enableIndexedDbPersistence(db);
  } catch (_) {}

  return db;
}

// ─── State & persistence ───────────────────────────────────────────────────
const COLL = 'livrogest';
const BOOKS0 = [
  {id:'b1',title:'O Pequeno Príncipe',author:'Antoine de Saint-Exupéry',isbn:'978-85-359-0277-1',category:'Literatura',costPrice:12,salePrice:25,stock:50},
  {id:'b2',title:'Dom Casmurro',author:'Machado de Assis',isbn:'978-85-7638-820-6',category:'Clássicos',costPrice:8,salePrice:18,stock:30},
  {id:'b3',title:'1984',author:'George Orwell',isbn:'978-85-250-6076-2',category:'Ficção Científica',costPrice:15,salePrice:32,stock:20},
  {id:'b4',title:'O Alquimista',author:'Paulo Coelho',isbn:'978-85-260-0408-5',category:'Literatura',costPrice:14,salePrice:29,stock:40},
  {id:'b5',title:'Sapiens',author:'Yuval Noah Harari',isbn:'978-85-254-3526-0',category:'Não-ficção',costPrice:22,salePrice:45,stock:25},
];

const DEFAULTS = { books: BOOKS0, clients: [], movements: [], kits: [], expenses: [] };

window.state = { books:[], clients:[], movements:[], kits:[], expenses:[] };

async function loadState() {
  setLoadMsg('Carregando dados...');
  const keys = Object.keys(DEFAULTS);
  await Promise.all(keys.map(async key => {
    try {
      const snap = await getDoc(doc(db, COLL, key));
      window.state[key] = snap.exists() ? snap.data().items : DEFAULTS[key];
    } catch {
      window.state[key] = DEFAULTS[key];
    }
  }));
}

let saveTimer = {};
window.saveState = function(key) {
  clearTimeout(saveTimer[key]);
  saveTimer[key] = setTimeout(async () => {
    try {
      await setDoc(doc(db, COLL, key), { items: window.state[key] });
      showSaveIndicator();
    } catch (e) {
      toast('Erro ao salvar: ' + e.message, 'error');
    }
  }, 800);
};

function showSaveIndicator() {
  const el = document.getElementById('save-indicator');
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display='none', 2000);
}

// ─── Helpers ───────────────────────────────────────────────────────────────
const genId = () => `${Date.now()}-${Math.floor(Math.random()*99999)}`;
const BRL = n => `R$ ${Number(n||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}`;
const fmtD = d => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-BR') : '-';
const today = () => new Date().toISOString().slice(0,10);
const CATS = ['Literatura','Clássicos','Ficção Científica','Romance','Autoajuda','Negócios','Infantil','Não-ficção','HQ','Outros'];
let chartInstances = {};

function setLoadMsg(m) { document.getElementById('loading-msg').textContent = m; }

window.toast = function(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className='toast', 3000);
};

// ─── Navigation ────────────────────────────────────────────────────────────
const PAGES = {
  dashboard: {icon:'📊',label:'Dashboard',section:'Principal',sub:'Visão geral do negócio'},
  livros:    {icon:'📚',label:'Catálogo',section:'Estoque',sub:'Gerencie seu acervo de livros'},
  movimentos:{icon:'🔄',label:'Entradas/Saídas',section:'Estoque',sub:'Controle de estoque e vendas'},
  kits:      {icon:'🎁',label:'Kits',section:'Estoque',sub:'Kits personalizados de livros'},
  clientes:  {icon:'👥',label:'Clientes',section:'Comercial',sub:'Cadastro e histórico'},
  gastos:    {icon:'💸',label:'Gastos',section:'Financeiro',sub:'Marketing e embalagens'},
  relatorios:{icon:'📈',label:'Relatórios',section:'Financeiro',sub:'Análises e indicadores'},
};
const SECTIONS = {
  Principal:['dashboard'],
  Estoque:['livros','movimentos','kits'],
  Comercial:['clientes'],
  Financeiro:['gastos','relatorios']
};
let currentPage = 'dashboard';

function buildNav() {
  document.getElementById('nav').innerHTML = Object.entries(SECTIONS).map(([sec,items]) =>
    `<div class="sb-section">${sec}</div>` +
    items.map(id => `<div class="nav-item ${currentPage===id?'active':''}" onclick="goto('${id}')">
      <span style="font-size:15px;width:18px;text-align:center">${PAGES[id].icon}</span>${PAGES[id].label}
    </div>`).join('')
  ).join('');
}

window.goto = function(page) {
  currentPage = page;
  Object.values(chartInstances).forEach(c => { try{c.destroy()}catch{} });
  chartInstances = {};
  buildNav();
  document.getElementById('page-title').textContent = PAGES[page].label;
  document.getElementById('page-sub').textContent = PAGES[page].sub;
  renderPage(page);
};

// ─── Modal ─────────────────────────────────────────────────────────────────
window.openModal = function(title, html, lg=false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-box').className = 'modal' + (lg?' modal-lg':'');
  document.getElementById('modal-overlay').style.display = 'flex';
};
window.closeModal = function() {
  document.getElementById('modal-overlay').style.display = 'none';
};

// ─── HTML helpers ───────────────────────────────────────────────────────────
const fg = (lbl,inp) => `<div class="fg"><label>${lbl}</label>${inp}</div>`;
const inp = (id,type='text',val='',ph='') =>
  `<input type="${type}" id="${id}" value="${String(val||'').replace(/"/g,'&quot;')}" placeholder="${ph}" style="width:100%">`;
const sel = (id,opts,val='') =>
  `<select id="${id}" style="width:100%">${opts.map(o => typeof o==='string'
    ? `<option ${o===val?'selected':''}>${o}</option>`
    : `<option value="${o.v}" ${o.v===val?'selected':''}>${o.l}</option>`
  ).join('')}</select>`;

function tbl(cols, rows, empty='Nenhum registro.') {
  return `<div style="overflow-x:auto"><table>
    <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
    <tbody>${rows.length===0
      ? `<tr class="empty-row"><td colspan="${cols.length}">${empty}</td></tr>`
      : rows.map((r,i) => `<tr>${cols.map(c=>`<td>${c.render?c.render(r,i):r[c.key]??'-'}</td>`).join('')}</tr>`).join('')
    }</tbody>
  </table></div>`;
}

function statCard(icon,lbl,value,color,sub='') {
  return `<div class="stat-card" style="border-left:4px solid ${color}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="stat-label">${lbl}</div>
        <div class="stat-value">${value}</div>
        ${sub?`<div class="stat-sub">${sub}</div>`:''}
      </div>
      <div class="stat-icon" style="background:${color}18">${icon}</div>
    </div>
  </div>`;
}

// ─── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDashboard() {
  const S = window.state;
  const totalStock = S.books.reduce((a,b)=>a+b.stock,0);
  const stockVal   = S.books.reduce((a,b)=>a+b.stock*b.salePrice,0);
  const now = new Date();
  const [mo,yr] = [now.getMonth(), now.getFullYear()];
  const monthMovs = S.movements.filter(m=>{const d=new Date(m.date);return d.getMonth()===mo&&d.getFullYear()===yr;});
  const monthRev  = monthMovs.filter(m=>m.type==='saida').reduce((a,m)=>a+m.quantity*m.unitPrice,0);
  const monthExp  = S.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===mo&&d.getFullYear()===yr;}).reduce((a,e)=>a+Number(e.amount),0);
  const lowStock  = S.books.filter(b=>b.stock<=5);
  const recentMovs= [...S.movements].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);

  const labels=[], revData=[], expData=[];
  for(let i=5;i>=0;i--){
    const d=new Date(yr,mo-i,1);
    labels.push(d.toLocaleDateString('pt-BR',{month:'short'}).replace('.',''));
    const m2=d.getMonth(),y2=d.getFullYear();
    revData.push(+S.movements.filter(mv=>mv.type==='saida'&&new Date(mv.date).getMonth()===m2&&new Date(mv.date).getFullYear()===y2).reduce((a,mv)=>a+mv.quantity*mv.unitPrice,0).toFixed(2));
    expData.push(+S.expenses.filter(e=>new Date(e.date).getMonth()===m2&&new Date(e.date).getFullYear()===y2).reduce((a,e)=>a+Number(e.amount),0).toFixed(2));
  }

  document.getElementById('content').innerHTML = `
    <div class="grid4" style="margin-bottom:16px">
      ${statCard('📚','Livros em Estoque',totalStock,'#6366f1',BRL(stockVal)+' em valor')}
      ${statCard('👥','Clientes',S.clients.length,'#3b82f6','')}
      ${statCard('📈','Receita do Mês',BRL(monthRev),'#10b981','')}
      ${statCard('💸','Gastos do Mês',BRL(monthExp),'#f59e0b','')}
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px">📊 Receita vs Gastos — 6 meses</div>
        <div class="chart-wrap"><canvas id="dash-chart"></canvas></div>
      </div>
      <div class="card">
        <div style="font-size:13px;font-weight:600;margin-bottom:12px">⚠️ Estoque Crítico</div>
        ${lowStock.length===0
          ? '<div style="color:var(--muted);font-size:13px;padding:16px 0;text-align:center">✅ Todos os livros OK!</div>'
          : lowStock.map(b=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
              <div style="font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.title}</div>
              <span class="badge badge-red" style="margin-left:8px">${b.stock} un.</span>
            </div>`).join('')
        }
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <span style="font-size:13px;font-weight:600">🔄 Últimas Movimentações</span>
        <button class="btn btn-sm" onclick="goto('movimentos')">Ver todas</button>
      </div>
      ${tbl([
        {label:'Data',render:r=>fmtD(r.date)},
        {label:'Tipo',render:r=>`<span class="badge ${r.type==='entrada'?'badge-green':'badge-red'}">${r.type==='entrada'?'↑ Entrada':'↓ Saída'}</span>`},
        {label:'Livro',render:r=>r.bookTitle||'-'},
        {label:'Qtd',key:'quantity'},
        {label:'Total',render:r=>`<strong>${BRL(r.quantity*r.unitPrice)}</strong>`},
        {label:'Cliente',render:r=>r.clientName||'-'},
      ], recentMovs, 'Nenhuma movimentação ainda.')}
    </div>`;

  setTimeout(()=>{
    const el = document.getElementById('dash-chart');
    if(!el) return;
    chartInstances['dash'] = new Chart(el, {
      type:'bar',
      data:{labels, datasets:[
        {label:'Receita',data:revData,backgroundColor:'#10b981',borderRadius:4,barThickness:14},

// ─── LIVROS ────────────────────────────────────────────────────────────────
let bookSearch='', bookCat='';
function renderLivros() {
  const q = bookSearch.toLowerCase();
  const filtered = window.state.books.filter(b =>
    (b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)) &&
    (!bookCat||b.category===bookCat)
  );
  document.getElementById('content').innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <div class="search-bar">
        <input class="search-input" id="book-search" placeholder="🔍 Buscar título ou autor..." oninput="bookSearch=this.value;renderLivros()" value="${bookSearch}">
        <select id="book-cat" onchange="bookCat=this.value;renderLivros()" style="padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Sora',sans-serif;outline:none">
          <option value="">Todas categorias</option>
          ${CATS.map(c=>`<option ${c===bookCat?'selected':''}>${c}</option>`).join('')}
        </select>
        <button class="btn" style="margin-left:auto" onclick="openBookModal()">+ Novo Livro</button>
      </div>
      <div style="font-size:12px;color:var(--muted)">${filtered.length} livro(s)</div>
    </div>
    <div class="card">
      ${tbl([
        {label:'Título / Autor',render:r=>`<div><div style="font-weight:600">${r.title}</div><div style="font-size:11px;color:var(--sub)">${r.author}</div></div>`},
        {label:'Categoria',render:r=>`<span class="badge badge-indigo">${r.category}</span>`},
        {label:'ISBN',key:'isbn'},
        {label:'Custo',render:r=>BRL(r.costPrice)},
        {label:'Venda',render:r=>BRL(r.salePrice)},
        {label:'Margem',render:r=>{const m=r.salePrice>0?((r.salePrice-r.costPrice)/r.salePrice*100):0;return `<span style="color:${m>20?'#10b981':m>0?'#f59e0b':'#ef4444'};font-weight:600">${m.toFixed(1)}%</span>`}},
        {label:'Estoque',render:r=>`<span class="badge ${r.stock<=5?'badge-red':r.stock<=15?'badge-amber':'badge-green'}">${r.stock}</span>`},
        {label:'',render:r=>`<div style="display:flex;gap:5px">
          <button class="btn btn-sm" onclick='openBookModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>✏️</button>
          <button class="btn btn-sm btn-red" onclick="delBook('${r.id}')">🗑️</button>
        </div>`},
      ], filtered)}
    </div>`;
}

window.openBookModal = function(book=null) {
  const isEdit = !!book;
  openModal(isEdit?'Editar Livro':'Novo Livro', `
    ${fg('Título *', inp('f-title','text',book?.title||''))}
    ${fg('Autor *',  inp('f-author','text',book?.author||''))}
    <div class="grid2">
      ${fg('ISBN',      inp('f-isbn','text',book?.isbn||''))}
      ${fg('Categoria', sel('f-cat',CATS,book?.category||'Literatura'))}
    </div>
    <div class="grid3">
      ${fg('Preço de Custo (R$)', inp('f-cost','number',book?.costPrice||''))}
      ${fg('Preço de Venda (R$)', inp('f-sale','number',book?.salePrice||''))}
      ${fg('Estoque',             inp('f-stock','number',book?.stock??''))}
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:6px">
      <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
      <button class="btn" onclick="saveBook('${book?.id||''}')">Salvar</button>
    </div>`);
};

window.saveBook = function(id) {
  const d = {
    title:     document.getElementById('f-title').value.trim(),
    author:    document.getElementById('f-author').value.trim(),
    isbn:      document.getElementById('f-isbn').value.trim(),
    category:  document.getElementById('f-cat').value,
    costPrice: parseFloat(document.getElementById('f-cost').value)||0,
    salePrice: parseFloat(document.getElementById('f-sale').value)||0,
    stock:     parseInt(document.getElementById('f-stock').value)||0,
  };
  if(!d.title||!d.author) return alert('Preencha título e autor.');
  if(id) window.state.books = window.state.books.map(b=>b.id===id?{...b,...d}:b);
  else window.state.books.push({...d, id:genId()});
  saveState('books'); closeModal(); renderLivros();
  toast(id?'Livro atualizado!':'Livro cadastrado!');
};

window.delBook = function(id) {
  if(!confirm('Excluir este livro?')) return;
  window.state.books = window.state.books.filter(b=>b.id!==id);
  saveState('books'); renderLivros(); toast('Livro removido.','error');
};

// ─── MOVIMENTOS ────────────────────────────────────────────────────────────
let movFilter='all';
window.renderMovimentos = function() {
  const sorted = [...window.state.movements]
    .filter(m=>movFilter==='all'||m.type===movFilter)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));

  document.getElementById('content').innerHTML = `
    <div style="display:grid;grid-template-columns:330px 1fr;gap:14px">
      <div class="card">
        <div style="font-size:14px;font-weight:700;margin-bottom:16px">Registrar Movimentação</div>
        <div class="fg"><label>Tipo *</label>
          <div class="type-toggle">
            <button id="tb-saida" class="type-btn" style="border:2px solid #ef4444;background:#fee2e2;color:#dc2626" onclick="setMovType('saida')">↓ Saída</button>
            <button id="tb-entrada" class="type-btn" style="border:2px solid var(--border);background:#fff;color:var(--sub)" onclick="setMovType('entrada')">↑ Entrada</button>
          </div>
        </div>
        <input type="hidden" id="mov-type" value="saida">
        <div class="fg"><label>Livro *</label>
          <select id="mov-book" onchange="autoMovPrice()" style="width:100%">
            <option value="">Selecione...</option>
            ${window.state.books.map(b=>`<option value="${b.id}">${b.title} (est: ${b.stock})</option>`).join('')}
          </select>
        </div>
        <div class="grid2">
          ${fg('Quantidade *', inp('mov-qty','number','','1'))}
          ${fg('Preço Unit. (R$) *', inp('mov-price','number','','0,00'))}
        </div>
        <div class="fg"><label>Cliente</label>
          <select id="mov-client" style="width:100%">
            <option value="">Sem cliente</option>
            ${window.state.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
          </select>
        </div>
        ${fg('Data', inp('mov-date','date',today()))}
        ${fg('Observações', inp('mov-notes','text','','Opcional'))}
        <div id="mov-total" style="display:none" class="alert alert-green"></div>
        <button class="btn" style="width:100%;justify-content:center" onclick="saveMov()">✅ Registrar</button>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span style="font-size:14px;font-weight:700">Histórico (${sorted.length})</span>
          <div class="filter-tabs">
            <button class="filter-tab ${movFilter==='all'?'active':''}"     onclick="movFilter='all';renderMovimentos()">Todos</button>
            <button class="filter-tab ${movFilter==='entrada'?'active':''}" onclick="movFilter='entrada';renderMovimentos()">Entradas</button>
            <button class="filter-tab ${movFilter==='saida'?'active':''}"   onclick="movFilter='saida';renderMovimentos()">Saídas</button>
          </div>
        </div>
        ${tbl([
          {label:'Data',render:r=>fmtD(r.date)},
          {label:'Tipo',render:r=>`<span class="badge ${r.type==='entrada'?'badge-green':'badge-red'}">${r.type==='entrada'?'↑ Entrada':'↓ Saída'}</span>`},
          {label:'Livro',render:r=>r.bookTitle||'-'},
          {label:'Qtd',key:'quantity'},
          {label:'Unit.',render:r=>BRL(r.unitPrice)},
          {label:'Total',render:r=>`<strong>${BRL(r.quantity*r.unitPrice)}</strong>`},
          {label:'Cliente',render:r=>r.clientName||'-'},
        ], sorted, 'Nenhuma movimentação registrada.')}
      </div>
    </div>`;

  ['mov-qty','mov-price'].forEach(id => {
    const el=document.getElementById(id);
    if(el) el.addEventListener('input', updateMovTotal);
  });
};

window.setMovType = function(t) {
  document.getElementById('mov-type').value=t;
  const s=document.getElementById('tb-saida'),e=document.getElementById('tb-entrada');
  if(t==='saida'){s.style.cssText='border:2px solid #ef4444;background:#fee2e2;color:#dc2626';e.style.cssText='border:2px solid var(--border);background:#fff;color:var(--sub)';}
  else{e.style.cssText='border:2px solid #10b981;background:#dcfce7;color:#166534';s.style.cssText='border:2px solid var(--border);background:#fff;color:var(--sub)';}
};

window.autoMovPrice = function() {
  const bookId=document.getElementById('mov-book').value;
  const book=window.state.books.find(b=>b.id===bookId);
  if(book) document.getElementById('mov-price').value=book.salePrice;
  updateMovTotal();
};

function updateMovTotal(){
  const qty=parseFloat(document.getElementById('mov-qty')?.value)||0;
  const price=parseFloat(document.getElementById('mov-price')?.value)||0;
  const el=document.getElementById('mov-total');
  if(el&&qty>0&&price>0){el.style.display='block';el.textContent=`💰 Total: ${BRL(qty*price)}`;}
}

window.saveMov = function() {
  const type=document.getElementById('mov-type').value;
  const bookId=document.getElementById('mov-book').value;
  const qty=parseInt(document.getElementById('mov-qty').value)||0;
  const price=parseFloat(document.getElementById('mov-price').value)||0;
  if(!bookId||!qty||!price) return alert('Preencha livro, quantidade e preço.');
  const book=window.state.books.find(b=>b.id===bookId);
  if(type==='saida'&&book.stock<qty) return alert(`Estoque insuficiente! Disponível: ${book.stock}`);
  const clientId=document.getElementById('mov-client').value;
  const client=clientId?window.state.clients.find(c=>c.id===clientId):null;
  window.state.movements.push({
    id:genId(),type,bookId,bookTitle:book.title,quantity:qty,unitPrice:price,
    clientId,clientName:client?.name||'-',
    date:document.getElementById('mov-date').value,
    notes:document.getElementById('mov-notes').value
  });
  window.state.books=window.state.books.map(b=>b.id===bookId?{...b,stock:b.stock+(type==='entrada'?qty:-qty)}:b);
  saveState('movements'); saveState('books');
  toast(type==='entrada'?'Entrada registrada!':'Saída registrada!');
  renderMovimentos();
};

      <div style="font-size:12px;color:var(--muted)">${filtered.length} cliente(s)</div>

    <div class="card">
      ${tbl([
        {label:'Nome / E-mail',render:r=>`<div><div style="font-weight:600">${r.name}</div><div style="font-size:11px;color:var(--sub)">${r.email||'-'}</div></div>`},
        {label:'Telefone',render:r=>r.phone||'-'},
        {label:'Endereço',render:r=>r.address||'-'},

        {label:'',render:r=>`<div style="display:flex;gap:5px">
          <button class="btn btn-sm" style="background:#3b82f6" onclick="viewClient('${r.id}')">📋 Histórico</button>
          <button class="btn btn-sm" onclick='openClientModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>✏️</button>

window.openClientModal = function(c=null) {

    ${fg('Nome *', inp('cf-name','text',c?.name||''))}

      ${fg('E-mail', inp('cf-email','email',c?.email||''))}

window.saveClient = function(id) {
  const d={name:document.getElementById('cf-name').value.trim(),email:document.getElementById('cf-email').value,phone:document.getElementById('cf-phone').value,address:document.getElementById('cf-address').value,notes:document.getElementById('cf-notes').value};

  toast(id?'Cliente atualizado!':'Cliente cadastrado!');
};

window.delClient = function(id) {
  if(!confirm('Excluir cliente?')) return;
  window.state.clients=window.state.clients.filter(c=>c.id!==id);
  saveState('clients'); renderClientes(); toast('Cliente removido.','error');

window.viewClient = function(id) {
  const c=window.state.clients.find(x=>x.id===id);
  const movs=window.state.movements.filter(m=>m.type==='saida'&&m.clientId===id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const total=movs.reduce((a,m)=>a+m.quantity*m.unitPrice,0);
  openModal(`📋 ${c.name}`, `
    <div class="alert alert-green">Total gasto: <strong>${BRL(total)}</strong> em ${movs.length} compra(s)</div>
    ${tbl([
      {label:'Data',render:r=>fmtD(r.date)},
      {label:'Livro',render:r=>r.bookTitle||'-'},
      {label:'Qtd',key:'quantity'},
      {label:'Preço Unit.',render:r=>BRL(r.unitPrice)},
      {label:'Total',render:r=>`<strong>${BRL(r.quantity*r.unitPrice)}</strong>`},
    ], movs, 'Nenhuma compra registrada.')}
    <div style="text-align:right;margin-top:12px"><button class="btn btn-gray" onclick="closeModal()">Fechar</button></div>
  `, true);
};

// ─── KITS ──────────────────────────────────────────────────────────────────
let kitItems=[];

window.renderKits = function() {
  const kitCost=kit=>kit.items.reduce((a,item)=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return a+(b?b.costPrice*item.quantity:0);},0);

  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:13px;color:var(--sub)">Monte kits com livros do catálogo.</div>
      <button class="btn" onclick="openKitModal()">+ Novo Kit</button>
    </div>
    ${window.state.kits.length===0
      ? `<div class="card" style="text-align:center;padding:52px"><div style="font-size:44px;margin-bottom:10px">🎁</div><div style="font-size:15px;font-weight:600">Nenhum kit criado</div><div style="font-size:13px;color:var(--sub);margin-top:6px">Clique em "+ Novo Kit" para começar.</div></div>`
      : `<div class="kit-grid">${window.state.kits.map(kit=>{
          const cost=kitCost(kit);
          const margin=Number(kit.salePrice)>0?((Number(kit.salePrice)-cost)/Number(kit.salePrice)*100):0;
          const hasStock=kit.items.every(item=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return b&&b.stock>=item.quantity;});
          return `<div class="kit-card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
              <div style="font-size:15px;font-weight:700">🎁 ${kit.name}</div>
              <span class="badge badge-green">${BRL(kit.salePrice)}</span>
            </div>
            ${kit.description?`<div style="font-size:12px;color:var(--sub);margin-bottom:8px">${kit.description}</div>`:''}
            <div style="font-size:12px;color:var(--sub);margin-bottom:5px">Livros incluídos:</div>
            ${kit.items.map(item=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return b?`<div style="font-size:12px;padding:2px 0">• ${b.title} × ${item.quantity}</div>`:''}).join('')}
            <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
              <div style="font-size:11px;color:var(--sub)">Custo<br><strong>${BRL(cost)}</strong></div>
              <div style="font-size:11px;color:var(--sub)">Margem<br><strong style="color:${margin>20?'#10b981':margin>0?'#f59e0b':'#ef4444'}">${margin.toFixed(1)}%</strong></div>
              <div style="font-size:11px;color:var(--sub)">Estoque<br><span class="badge ${hasStock?'badge-green':'badge-red'}" style="font-size:10px">${hasStock?'OK':'Baixo'}</span></div>
            </div>
            <div style="display:flex;gap:6px;margin-top:10px">
              <button class="btn btn-sm btn-green" style="flex:1" onclick="sellKit('${kit.id}')">Vender Kit</button>
              <button class="btn btn-sm" onclick='openKitModal(${JSON.stringify(kit).replace(/'/g,"&#39;")})'>✏️</button>
              <button class="btn btn-sm btn-red" onclick="delKit('${kit.id}')">🗑️</button>
            </div>
          </div>`;
        }).join('')}</div>`
    }`;
};

window.openKitModal = function(kit=null) {
  kitItems=kit?[...kit.items]:[];
  openModal(kit?'Editar Kit':'Novo Kit', `
    ${fg('Nome do Kit *', inp('kf-name','text',kit?.name||''))}
    ${fg('Descrição', inp('kf-desc','text',kit?.description||'','Ex: Kit férias leitura'))}
    ${fg('Preço de Venda (R$) *', inp('kf-price','number',kit?.salePrice||''))}
    <div style="font-size:13px;font-weight:600;margin:6px 0 8px">Livros do Kit</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select id="kf-book" style="flex:2;padding:9px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Sora',sans-serif;outline:none">
        <option value="">Selecione um livro...</option>
        ${window.state.books.map(b=>`<option value="${b.id}">${b.title}</option>`).join('')}
      </select>
      <input type="number" id="kf-qty" value="1" min="1" style="width:64px;padding:9px 8px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Sora',sans-serif;outline:none;text-align:center">
      <button class="btn btn-sm btn-green" onclick="addKitItem()">+ Add</button>
    </div>
    <div id="kit-items-list"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
      <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
      <button class="btn" onclick="saveKit('${kit?.id||''}')">Salvar Kit</button>
    </div>`);
  renderKitItems();
};

function renderKitItems(){
  const el=document.getElementById('kit-items-list');
  if(!el) return;
  el.innerHTML=kitItems.length===0?'<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Nenhum livro adicionado.</div>':
    kitItems.map((item,i)=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:#f8fafc;border-radius:7px;margin-bottom:5px"><span style="font-size:12px">${b?.title||'?'} × ${item.quantity}</span><button class="btn btn-sm btn-red" onclick="removeKitItem(${i})">✕</button></div>`;}).join('');
}

window.addKitItem=function(){
  const bookId=document.getElementById('kf-book').value;
  const qty=parseInt(document.getElementById('kf-qty').value)||1;
  if(!bookId) return;
  const ex=kitItems.findIndex(i=>i.bookId===bookId);
  if(ex>=0) kitItems[ex].quantity+=qty; else kitItems.push({bookId,quantity:qty});
  renderKitItems();
};

window.removeKitItem=function(i){kitItems.splice(i,1);renderKitItems();};

window.saveKit=function(id){
  const d={name:document.getElementById('kf-name').value.trim(),description:document.getElementById('kf-desc').value,salePrice:parseFloat(document.getElementById('kf-price').value)||0,items:[...kitItems]};
  if(!d.name||!d.salePrice) return alert('Preencha nome e preço.');
  if(d.items.length===0) return alert('Adicione pelo menos um livro.');
  if(id) window.state.kits=window.state.kits.map(k=>k.id===id?{...k,...d}:k);
  else window.state.kits.push({...d,id:genId()});
  saveState('kits'); closeModal(); renderKits();
  toast(id?'Kit atualizado!':'Kit criado!');
};

window.delKit=function(id){
  if(!confirm('Excluir kit?')) return;
  window.state.kits=window.state.kits.filter(k=>k.id!==id);
  saveState('kits'); renderKits(); toast('Kit removido.','error');
};

window.sellKit=function(id){
  const kit=window.state.kits.find(k=>k.id===id);
  const canSell=kit.items.every(item=>{const b=window.state.books.find(bk=>bk.id===item.bookId);return b&&b.stock>=item.quantity;});
  openModal(`Vender Kit: ${kit.name}`,`
    ${!canSell?`<div class="alert alert-red">⚠️ Estoque insuficiente para algum livro!</div>`:''}
    ${fg('Quantidade de Kits', inp('sk-qty','number','1'))}
    ${fg('Data', inp('sk-date','date',today()))}
    ${fg('Cliente',`<select id="sk-client" style="width:100%"><option value="">Sem cliente</option>${window.state.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>`)}
    <div class="alert alert-green">Preço unitário: <strong>${BRL(kit.salePrice)}</strong></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="confirmSellKit('${kit.id}')" ${!canSell?'disabled':''}>Confirmar Venda</button>
    </div>`);
};

window.confirmSellKit=function(kitId){
  const kit=window.state.kits.find(k=>k.id===kitId);
  const qty=parseInt(document.getElementById('sk-qty').value)||1;
  const date=document.getElementById('sk-date').value;
  const clientId=document.getElementById('sk-client').value;
  const client=clientId?window.state.clients.find(c=>c.id===clientId):null;
  kit.items.forEach(item=>{
    const b=window.state.books.find(bk=>bk.id===item.bookId);
    window.state.movements.push({id:genId(),type:'saida',bookId:item.bookId,bookTitle:b.title,quantity:item.quantity*qty,unitPrice:b.salePrice,clientId,clientName:client?.name||'-',date,notes:`Kit: ${kit.name}`});
    window.state.books=window.state.books.map(bk=>bk.id===item.bookId?{...bk,stock:bk.stock-item.quantity*qty}:bk);
  });
  saveState('movements'); saveState('books');
  closeModal(); renderKits(); toast('Venda de kit registrada!');
};

// ─── GASTOS ────────────────────────────────────────────────────────────────
let gastoFilter='all';
function renderGastos(){
  const totM=window.state.expenses.filter(e=>e.type==='marketing').reduce((a,e)=>a+Number(e.amount),0);
  const totE=window.state.expenses.filter(e=>e.type==='embalagem').reduce((a,e)=>a+Number(e.amount),0);
  const filtered=[...window.state.expenses].filter(e=>gastoFilter==='all'||e.type===gastoFilter).sort((a,b)=>new Date(b.date)-new Date(a.date));

  document.getElementById('content').innerHTML=`
    <div class="grid2" style="margin-bottom:14px">
      ${statCard('📣','Total Marketing',BRL(totM),'#6366f1','')}
      ${statCard('📦','Total Embalagens',BRL(totE),'#f59e0b','')}
    </div>
    <div style="display:grid;grid-template-columns:300px 1fr;gap:14px">
      <div class="card">
        <div style="font-size:14px;font-weight:700;margin-bottom:16px">Registrar Gasto</div>
        <div class="fg"><label>Tipo *</label>
          <div class="type-toggle">
            <button id="gb-mkt" class="type-btn" style="border:2px solid #6366f1;background:#eef2ff;color:#4338ca" onclick="setGastoType('marketing')">📣 Marketing</button>
            <button id="gb-emb" class="type-btn" style="border:2px solid var(--border);background:#fff;color:var(--sub)" onclick="setGastoType('embalagem')">📦 Embalagem</button>
          </div>
        </div>
        <input type="hidden" id="gt-type" value="marketing">
        ${fg('Descrição *', inp('gt-desc','text','','Ex: Anúncio Instagram'))}
        <div class="grid2">
          ${fg('Valor (R$) *', inp('gt-amount','number','','0,00'))}
          ${fg('Data', inp('gt-date','date',today()))}
        </div>
        ${fg('Observações', inp('gt-notes','text','','Opcional'))}
        <button class="btn" style="width:100%;justify-content:center" onclick="saveGasto()">Registrar Gasto</button>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span style="font-size:14px;font-weight:700">Histórico</span>
          <div class="filter-tabs">
            <button class="filter-tab ${gastoFilter==='all'?'active':''}"       onclick="gastoFilter='all';renderGastos()">Todos</button>
            <button class="filter-tab ${gastoFilter==='marketing'?'active':''}" onclick="gastoFilter='marketing';renderGastos()">Marketing</button>
            <button class="filter-tab ${gastoFilter==='embalagem'?'active':''}" onclick="gastoFilter='embalagem';renderGastos()">Embalagens</button>
          </div>
        </div>
        ${tbl([
          {label:'Data',render:r=>fmtD(r.date)},
          {label:'Tipo',render:r=>`<span class="badge ${r.type==='marketing'?'badge-indigo':'badge-amber'}">${r.type==='marketing'?'📣 Marketing':'📦 Embalagem'}</span>`},
          {label:'Descrição',key:'description'},
          {label:'Valor',render:r=>`<strong style="color:#ef4444">${BRL(r.amount)}</strong>`},
          {label:'',render:r=>`<button class="btn btn-sm btn-red" onclick="delGasto('${r.id}')">🗑️</button>`},
        ], filtered, 'Nenhum gasto registrado.')}
      </div>
    </div>`;
}

window.setGastoType=function(t){
  document.getElementById('gt-type').value=t;
  const bm=document.getElementById('gb-mkt'),be=document.getElementById('gb-emb');
  if(t==='marketing'){bm.style.cssText='border:2px solid #6366f1;background:#eef2ff;color:#4338ca';be.style.cssText='border:2px solid var(--border);background:#fff;color:var(--sub)';}
  else{be.style.cssText='border:2px solid #f59e0b;background:#fef3c7;color:#92400e';bm.style.cssText='border:2px solid var(--border);background:#fff;color:var(--sub)';}
};

window.saveGasto=function(){
  const d={type:document.getElementById('gt-type').value,description:document.getElementById('gt-desc').value.trim(),amount:parseFloat(document.getElementById('gt-amount').value)||0,date:document.getElementById('gt-date').value,notes:document.getElementById('gt-notes').value};
  if(!d.description||!d.amount) return alert('Preencha descrição e valor.');
  window.state.expenses.push({...d,id:genId()});
  saveState('expenses'); renderGastos(); toast('Gasto registrado!');
};

window.delGasto=function(id){
  window.state.expenses=window.state.expenses.filter(e=>e.id!==id);
  saveState('expenses'); renderGastos();
};

// ─── RELATÓRIOS ────────────────────────────────────────────────────────────
function renderRelatorios(){
  const S=window.state;
  const totalRev=S.movements.filter(m=>m.type==='saida').reduce((a,m)=>a+m.quantity*m.unitPrice,0);
  const totalCost=S.movements.filter(m=>m.type==='entrada').reduce((a,m)=>a+m.quantity*m.unitPrice,0);
  const totalExp=S.expenses.reduce((a,e)=>a+Number(e.amount),0);
  const profit=totalRev-totalCost-totalExp;
  const now=new Date();
  const labels=[],revD=[],expD=[],lucD=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    labels.push(d.toLocaleDateString('pt-BR',{month:'short'}).replace('.',''));
    const mo=d.getMonth(),yr=d.getFullYear();
    const rev=S.movements.filter(mv=>mv.type==='saida'&&new Date(mv.date).getMonth()===mo&&new Date(mv.date).getFullYear()===yr).reduce((a,mv)=>a+mv.quantity*mv.unitPrice,0);
    const exp=S.expenses.filter(e=>new Date(e.date).getMonth()===mo&&new Date(e.date).getFullYear()===yr).reduce((a,e)=>a+Number(e.amount),0);
    revD.push(+rev.toFixed(2)); expD.push(+exp.toFixed(2)); lucD.push(+(rev-exp).toFixed(2));
  }
  const topBooks=S.books.map(b=>{
    const sold=S.movements.filter(m=>m.type==='saida'&&m.bookId===b.id).reduce((a,m)=>a+m.quantity,0);
    const rev=S.movements.filter(m=>m.type==='saida'&&m.bookId===b.id).reduce((a,m)=>a+m.quantity*m.unitPrice,0);
    return{...b,sold,rev};
  }).filter(b=>b.sold>0).sort((a,b)=>b.sold-a.sold).slice(0,6);

  const catRev=CATS.map(cat=>{
    const v=S.movements.filter(m=>m.type==='saida').reduce((a,m)=>{const b=S.books.find(bk=>bk.id===m.bookId);return b?.category===cat?a+m.quantity*m.unitPrice:a;},0);
    return{name:cat,value:+v.toFixed(2)};
  }).filter(c=>c.value>0).sort((a,b)=>b.value-a.value).slice(0,6);

  const mktTot=S.expenses.filter(e=>e.type==='marketing').reduce((a,e)=>a+Number(e.amount),0);
  const embTot=S.expenses.filter(e=>e.type==='embalagem').reduce((a,e)=>a+Number(e.amount),0);

  document.getElementById('content').innerHTML=`
    <div class="grid4" style="margin-bottom:14px">
      ${statCard('📈','Receita Total',BRL(totalRev),'#10b981','')}
      ${statCard('📉','Custo Compras',BRL(totalCost),'#ef4444','')}
      ${statCard('💸','Gastos Operac.',BRL(totalExp),'#f59e0b','')}
      ${statCard('💰','Lucro Líquido',BRL(profit),profit>=0?'#10b981':'#ef4444','')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">📊 Tendência Mensal</div><div class="chart-wrap"><canvas id="rpt-line"></canvas></div></div>
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">🥧 Gastos por Tipo</div><div class="chart-wrap"><canvas id="rpt-pie"></canvas></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">🏆 Top Livros Vendidos</div>
        ${topBooks.length===0?'<div style="text-align:center;color:var(--muted);padding:24px">Nenhuma venda registrada.</div>':
          tbl([
            {label:'Livro',render:r=>`<div style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${r.title}</div>`},
            {label:'Vendidos',render:r=>`<span class="badge badge-indigo">${r.sold}</span>`},
            {label:'Receita',render:r=>`<strong style="color:#10b981">${BRL(r.rev)}</strong>`},
          ], topBooks)
        }
      </div>
      <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:14px">📂 Receita por Categoria</div>
        ${catRev.length===0?'<div style="text-align:center;color:var(--muted);padding:24px">Nenhuma venda.</div>':`<div class="chart-wrap"><canvas id="rpt-bar"></canvas></div>`}
      </div>
    </div>`;

  setTimeout(()=>{
    const lc=document.getElementById('rpt-line');
    if(lc) chartInstances['line']=new Chart(lc,{type:'line',data:{labels,datasets:[
      {label:'Receita',data:revD,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)',tension:.3,fill:true,pointRadius:4},
      {label:'Gastos', data:expD,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.05)',tension:.3,fill:true,pointRadius:4},
      {label:'Lucro',  data:lucD,borderColor:'#6366f1',tension:.3,pointRadius:4},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Sora'},boxWidth:12}}},scales:{x:{grid:{display:false},ticks:{font:{family:'Sora',size:11}}},y:{ticks:{font:{family:'Sora',size:11},callback:v=>'R$'+v}}}}});

    const pc=document.getElementById('rpt-pie');
    if(pc&&(mktTot>0||embTot>0)) chartInstances['pie']=new Chart(pc,{type:'doughnut',data:{labels:['Marketing','Embalagens'],datasets:[{data:[mktTot,embTot],backgroundColor:['#6366f1','#f59e0b'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Sora'},boxWidth:12}}}}});

    const bc=document.getElementById('rpt-bar');
    if(bc&&catRev.length>0) chartInstances['bar']=new Chart(bc,{type:'bar',data:{labels:catRev.map(c=>c.name),datasets:[{data:catRev.map(c=>c.value),backgroundColor:'#6366f1',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{family:'Sora',size:11},callback:v=>'R$'+v}},y:{grid:{display:false},ticks:{font:{family:'Sora',size:11}}}}}});
  },50);
}

// ─── Router ────────────────────────────────────────────────────────────────
// Expose ALL render functions on window so onclick handlers and renderPage can reach them
window.renderDashboard  = renderDashboard;
window.renderLivros     = renderLivros;
window.renderMovimentos = window.renderMovimentos; // already set above
window.renderClientes   = renderClientes;
window.renderKits       = window.renderKits;       // already set above
window.renderGastos     = renderGastos;
window.renderRelatorios = renderRelatorios;
window.saveState        = saveState;

function renderPage(p){
  const map = {
    dashboard:  window.renderDashboard,
    livros:     window.renderLivros,
    movimentos: window.renderMovimentos,
    clientes:   window.renderClientes,
    kits:       window.renderKits,
    gastos:     window.renderGastos,
    relatorios: window.renderRelatorios,
  };
  if(map[p]) map[p]();
  else console.warn('renderPage: page not found:', p);
}

// ─── Boot ──────────────────────────────────────────────────────────────────
document.getElementById('top-date').textContent =
  new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

initFirebase()
  .then(() => loadState())
  .then(() => {
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    buildNav();
    renderPage('dashboard');
    // Register PWA service worker
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  })
  .catch(err => console.error('Boot error:', err));
</script>
</body>
</html>
